<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBEED1">
<title>Fake Chart Detective — RML</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FBEED1;
  --bg-tint: #FDF6E3;
  --paper: #FFFFFF;
  --ink: #1A1A1A;
  --ink-soft: #2D2D33;
  --ink-muted: #6B6B70;
  --ink-locked: #9B9B9B;
  --line: #E8DFC8;
  --yellow: #F5C43E;
  --yellow-soft: #FFE8A0;
  --yellow-deep: #E0A823;
  --tint-cream: #FBEED1;
  --tint-peach: #FFD4C0;
  --tint-lavender: #F8C5D9;
  --tint-sky: #C8E5F2;
  --tint-mint: #C5F0DC;
  --bold-orange: #FFB592;
  --bold-sky: #7FCFEA;
  --bold-magenta: #F472C8;
  --bold-mint: #3FD68F;
  --status-green: #00B66E;
  --status-red: #E5483D;
  --status-amber: #F5A623;
  --coral: #E5483D;
  --coral-soft: #FDE7EB;
  --shadow-card: 0 2px 0 var(--ink);
  --shadow-lift: 0 4px 0 var(--ink);
  --font-display: "Sora", system-ui, sans-serif;
  --font-body: "Inter", system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  font-weight: 500;
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: 80px;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 32px 32px;
  background-position: 0 0;
}

/* ─── HEADER ─────────────────────────────────────── */
header.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--paper);
  border-bottom: 2px solid var(--ink);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 14px;
  letter-spacing: -0.3px;
}
.brand .logo {
  width: 28px; height: 28px;
  background: var(--coral);
  color: white;
  border: 2px solid var(--ink);
  display: grid;
  place-items: center;
  font-size: 14px;
  font-weight: 900;
}
.brand-text { display: flex; flex-direction: column; line-height: 1; gap: 2px; }
.brand-text .case { font-size: 9px; letter-spacing: 1.5px; color: var(--ink-muted); font-weight: 800; }
.brand-text .name { font-size: 13px; font-weight: 900; color: var(--ink); }

.topbar-section {
  flex: 1;
  text-align: center;
  font-size: 11px;
  font-weight: 800;
  color: var(--ink-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  background: var(--bg-tint);
  border: 1.5px solid var(--ink);
  padding: 6px 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}
.topbar-section:hover { background: var(--yellow-soft); }
.topbar-section .arrow { color: var(--ink); margin-left: 4px; }

.topbar-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 36px; height: 36px;
  background: var(--paper);
  border: 1.5px solid var(--ink);
  color: var(--ink);
  font-size: 14px;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: background 0.15s;
}
.icon-btn:hover { background: var(--yellow-soft); }

/* ─── PROGRESS DOTS ─────────────────────────────── */
.progress-wrap {
  display: flex;
  gap: 4px;
  padding: 10px 16px 0;
  max-width: 520px;
  margin: 0 auto;
}
.progress-dot {
  flex: 1;
  height: 5px;
  background: var(--line);
  border: 1px solid var(--ink);
}
.progress-dot.active { background: var(--bold-mint); }
.progress-dot.current { background: var(--yellow); }

/* ─── MAIN ───────────────────────────────────────── */
main {
  max-width: 520px;
  margin: 0 auto;
  padding: 16px;
}
.frame {
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 20px 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-card);
}

.eyebrow {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--coral);
  margin-bottom: 6px;
  padding: 3px 8px;
  display: inline-block;
  background: var(--coral-soft);
  border: 1.5px solid var(--ink);
}
h1.step-title {
  font-family: var(--font-display);
  font-size: clamp(20px, 5.5vw, 26px);
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: -0.5px;
  color: var(--ink);
  margin-bottom: 14px;
}

/* ─── NEWS BLOCK ─────────────────────────────────── */
.news-block {
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 14px;
  margin-bottom: 14px;
}
.news-block.dishonest { border-left: 6px solid var(--coral); }
.news-block.honest { border-left: 6px solid var(--bold-mint); }
.byline {
  font-family: var(--font-display);
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--ink-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
}
.headline {
  font-family: var(--font-display);
  font-size: clamp(16px, 4.5vw, 20px);
  font-weight: 900;
  letter-spacing: -0.4px;
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: 4px;
}
.headline .hot { color: var(--coral); }
.subhead {
  font-size: 12px;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 10px;
  line-height: 1.35;
}
svg.chart {
  width: 100%;
  height: auto;
  display: block;
  background: var(--bg-tint);
  border: 1.5px solid var(--ink);
  margin-top: 6px;
}
.chart-caption {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 6px;
  text-align: center;
  font-weight: 700;
}

/* ─── LENS BUBBLE ────────────────────────────────── */
.lens-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
  align-items: flex-start;
}
.lens-mascot {
  width: 44px; height: 44px;
  flex-shrink: 0;
  background: var(--yellow);
  border: 2px solid var(--ink);
  display: grid;
  place-items: center;
  font-size: 22px;
  box-shadow: 2px 2px 0 var(--ink);
}
.lens-bubble {
  flex: 1;
  background: var(--bg-tint);
  border: 2px solid var(--ink);
  padding: 10px 12px;
  position: relative;
  font-size: 14px;
  line-height: 1.4;
  color: var(--ink-soft);
  font-weight: 500;
}
.lens-bubble::before {
  content: "";
  position: absolute;
  left: -9px;
  top: 14px;
  width: 0; height: 0;
  border: 7px solid transparent;
  border-right-color: var(--ink);
  border-left: 0;
}
.lens-bubble::after {
  content: "";
  position: absolute;
  left: -6px;
  top: 16px;
  width: 0; height: 0;
  border: 5px solid transparent;
  border-right-color: var(--bg-tint);
  border-left: 0;
}
.lens-name {
  font-family: var(--font-display);
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 2px;
  color: var(--coral);
  margin-bottom: 4px;
  text-transform: uppercase;
}

/* ─── QUESTIONS / OPTIONS ───────────────────────── */
.q {
  margin-bottom: 14px;
}
.q-label {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--coral);
  margin-bottom: 6px;
}
.q-text {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.35;
  margin-bottom: 12px;
}

.options { display: flex; flex-direction: column; gap: 8px; }
.option {
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 12px 14px;
  text-align: left;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  line-height: 1.3;
  transition: transform 0.1s, background 0.15s, border-color 0.15s;
  width: 100%;
}
.option:not(:disabled):hover { background: var(--yellow-soft); }
.option:not(:disabled):active { transform: translate(1px, 1px); }
.option-num {
  flex-shrink: 0;
  width: 24px; height: 24px;
  display: grid;
  place-items: center;
  background: var(--bg);
  border: 1.5px solid var(--ink);
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 12px;
}
.option .body { flex: 1; }
.option.correct {
  background: var(--tint-mint);
  border-color: var(--status-green);
  color: var(--ink);
}
.option.correct .option-num { background: var(--status-green); color: white; border-color: var(--status-green); }
.option.wrong {
  background: var(--coral-soft);
  animation: shake 0.4s;
}
.option.wrong .option-num { background: var(--coral); color: white; }
.option.missed { background: var(--coral-soft); border-style: dashed; }
.option.seen {
  background: var(--tint-lavender);
  border-color: var(--ink);
}
.option.seen .option-num { background: var(--ink); color: white; }
.option.selected {
  background: var(--yellow-soft);
  border-color: var(--ink);
}
.option.selected .option-num { background: var(--yellow); }
.option.multi[aria-pressed="true"] { background: var(--yellow-soft); }
.option:disabled { cursor: default; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* ─── CHIP ROW ─────────────────────────────────── */
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 10px 14px;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 800;
  color: var(--ink);
  cursor: pointer;
  flex: 1 1 auto;
  min-width: 100px;
  text-align: center;
  transition: background 0.15s;
}
.chip:not(:disabled):hover { background: var(--yellow-soft); }
.chip.selected { background: var(--yellow); }
.chip.locked { background: var(--tint-mint); border-color: var(--status-green); }

/* ─── FEEDBACK ─────────────────────────────────── */
.feedback {
  background: var(--tint-mint);
  border: 2px solid var(--status-green);
  padding: 12px 14px;
  margin: 12px 0;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.4;
  color: var(--ink);
}
.feedback.hot {
  background: var(--coral-soft);
  border-color: var(--coral);
}
.feedback.amber {
  background: #FFF1D6;
  border-color: var(--status-amber);
}
.feedback strong { font-weight: 900; }
.feedback.hidden { display: none; }
.hidden { display: none !important; }

/* ─── BUTTONS ─────────────────────────────────── */
.btn {
  background: var(--yellow);
  border: 2px solid var(--ink);
  padding: 14px 20px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 15px;
  color: var(--ink);
  cursor: pointer;
  width: 100%;
  text-align: center;
  letter-spacing: 0.3px;
  transition: background 0.15s, transform 0.1s;
  box-shadow: var(--shadow-card);
}
.btn:not(:disabled):hover { background: var(--yellow-deep); }
.btn:not(:disabled):active { transform: translate(1px, 1px); box-shadow: 0 0 0 var(--ink); }
.btn:disabled {
  background: var(--bg-tint);
  color: var(--ink-locked);
  border-color: var(--ink-muted);
  cursor: not-allowed;
  box-shadow: none;
}
.btn.secondary {
  background: var(--paper);
  color: var(--ink);
}
.btn.secondary:not(:disabled):hover { background: var(--bg-tint); }
.btn.coral {
  background: var(--coral);
  color: white;
}
.btn.coral:not(:disabled):hover { background: #C73B32; }

.nav-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}
.nav-row .btn { flex: 1; }

/* ─── INTEGER INPUT ─────────────────────────────── */
.num-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
  align-items: stretch;
}
.num-input {
  flex: 1;
  border: 2px solid var(--ink);
  padding: 12px 14px;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 900;
  text-align: center;
  background: var(--paper);
  color: var(--ink);
  -moz-appearance: textfield;
}
.num-input::-webkit-outer-spin-button,
.num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.num-input:focus { outline: none; background: var(--yellow-soft); }
.num-input.correct { background: var(--tint-mint); border-color: var(--status-green); }
.num-input.wrong { background: var(--coral-soft); border-color: var(--coral); animation: shake 0.4s; }

.num-check {
  background: var(--ink);
  color: white;
  border: 2px solid var(--ink);
  padding: 0 16px;
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: background 0.15s;
}
.num-check:not(:disabled):hover { background: #333; }
.num-check:disabled { background: var(--ink-locked); border-color: var(--ink-locked); cursor: not-allowed; }

.num-prompt {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-soft);
  margin-bottom: 6px;
}
.num-unit {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-muted);
  align-self: center;
  padding: 0 4px;
}

/* ─── SLIDER ──────────────────────────────────── */
.slider-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  background: var(--bg-tint);
  border: 2px solid var(--ink);
  padding: 10px 12px;
}
.slider-label {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-muted);
  flex-shrink: 0;
}
.slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  background: var(--ink);
  outline: none;
  border-radius: 0;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 24px; height: 24px;
  background: var(--yellow);
  border: 2px solid var(--ink);
  cursor: pointer;
}
.slider::-moz-range-thumb {
  width: 24px; height: 24px;
  background: var(--yellow);
  border: 2px solid var(--ink);
  cursor: pointer;
}
.slider-value {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 900;
  color: var(--ink);
  min-width: 64px;
  text-align: right;
  background: var(--paper);
  border: 1.5px solid var(--ink);
  padding: 4px 8px;
}

/* ─── STATUS PILLS ─────────────────────────────── */
.status-pill {
  display: inline-block;
  padding: 4px 10px;
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: white;
}
.status-pill.green { background: var(--status-green); }
.status-pill.red { background: var(--status-red); }
.status-pill.amber { background: var(--status-amber); }

/* ─── TOOLKIT STRIP ─────────────────────────────── */
.toolkit-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.tool-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 800;
  padding: 5px 9px;
  background: var(--bg-tint);
  border: 1.5px solid var(--ink-locked);
  color: var(--ink-muted);
  opacity: 0.5;
}
.tool-chip.earned {
  background: var(--tint-mint);
  border-color: var(--status-green);
  color: var(--ink);
  opacity: 1;
  font-weight: 900;
}

/* ─── PICTOGRAM ───────────────────────────────── */
.pictogram {
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  background: var(--bg-tint);
  border: 1.5px solid var(--ink);
  padding: 16px 12px;
  min-height: 220px;
  gap: 16px;
  position: relative;
}
.picto-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.picto-icon {
  background: var(--ink);
  display: grid;
  place-items: center;
  color: white;
  font-size: 24px;
  border: 2px solid var(--ink);
  transition: width 0.3s, height 0.3s;
}
.picto-icon.iphone { background: var(--bold-sky); color: var(--ink); }
.picto-icon.samsung { background: var(--bold-magenta); color: white; }
.picto-label {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 900;
  text-align: center;
}
.picto-grid-overlay {
  position: absolute;
  inset: 16px 12px;
  background-image:
    linear-gradient(var(--ink) 1px, transparent 1px),
    linear-gradient(90deg, var(--ink) 1px, transparent 1px);
  background-size: 20px 20px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.picto-grid-overlay.show { opacity: 0.6; }

/* ─── DRAG/SNAP CANDIDATES ─────────────────────── */
.candidate-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.candidate {
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 12px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  text-align: left;
  width: 100%;
}
.candidate-emoji { font-size: 22px; flex-shrink: 0; }
.candidate:not(:disabled):hover { background: var(--yellow-soft); }
.candidate.locked {
  background: var(--tint-mint);
  border-color: var(--status-green);
}
.candidate.dud { background: var(--coral-soft); }

/* ─── INTRO / EVIDENCE GRID ────────────────────── */
.case-hero {
  text-align: center;
  margin-bottom: 16px;
}
.case-hero h1 {
  font-family: var(--font-display);
  font-size: clamp(26px, 7vw, 34px);
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1.05;
  margin: 4px 0 8px;
}
.case-hero .tag-line {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 2.5px;
  font-weight: 900;
  background: var(--coral);
  color: white;
  padding: 4px 10px;
  display: inline-block;
}
.case-hero .hook {
  font-size: 14px;
  color: var(--ink-soft);
  font-weight: 600;
  line-height: 1.45;
  margin: 12px 0;
}
.case-meta {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  font-size: 11px;
  color: var(--ink-muted);
  font-weight: 800;
  letter-spacing: 0.2px;
}
.case-meta span {
  background: var(--bg-tint);
  border: 1.5px solid var(--ink);
  padding: 4px 8px;
}

.postit {
  background: var(--yellow-soft);
  border: 2px solid var(--ink);
  padding: 12px 14px;
  margin: 14px 0;
  position: relative;
}
.postit .from {
  font-family: var(--font-display);
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 1.5px;
  color: var(--coral);
  margin-bottom: 4px;
}
.postit p {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.45;
  color: var(--ink-soft);
}

.evidence-title {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin: 16px 0 8px;
}
.evidence-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.evidence-card {
  background: var(--bg-tint);
  border: 1.5px solid var(--ink);
  padding: 8px;
}
.evidence-card .stamp {
  font-family: var(--font-display);
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 1.5px;
  color: var(--coral);
  margin-bottom: 4px;
}
.evidence-card .mini-head {
  font-size: 11px;
  font-weight: 700;
  line-height: 1.25;
  color: var(--ink);
  margin-bottom: 4px;
}

/* ═════════════════════════════════════════════════
   SFX — Web Audio synth (no external assets)
   ═════════════════════════════════════════════════ */
let muted = false;
const SFX = (() => {
  let ctx;
  const ensure = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; };
  const beep = (freq, dur, type='sine', vol=0.18) => {
    if (muted) return;
    try {
      const c = ensure(); const t = c.currentTime;
      const o = c.createOscillator(); const g = c.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + dur);
    } catch(e) {}
  };
  const arpeggio = (notes, dur=0.07) => {
    notes.forEach((n,i) => setTimeout(() => beep(n, dur, 'triangle', 0.15), i * 70));
  };
  return {
    click: () => beep(420, 0.04, 'square', 0.06),
    soft: () => beep(640, 0.06, 'sine', 0.08),
    correct: () => arpeggio([523, 659, 784, 1047]),
    wrong: () => { beep(220, 0.12, 'sawtooth', 0.1); setTimeout(() => beep(165, 0.18, 'sawtooth', 0.1), 120); },
    tool: () => arpeggio([523, 659, 784, 1047, 1319], 0.1),
    tick: () => beep(880, 0.02, 'sine', 0.04),
  };
})();

/* ═════════════════════════════════════════════════
   SVG CHART RENDERERS — sized for 360×220 viewBox
   ═════════════════════════════════════════════════ */
const W = 360, H = 220, PAD_L = 36, PAD_R = 12, PAD_T = 12, PAD_B = 36;

function svgEl(tag, attrs={}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function clearSvg(svg) { while (svg.firstChild) svg.removeChild(svg.firstChild); }

function drawAxes(svg, yMin, yMax, ticks=4, labelLeft='', barColor) {
  const innerH = H - PAD_T - PAD_B;
  const innerW = W - PAD_L - PAD_R;
  // y-axis
  svg.appendChild(svgEl('line', { x1: PAD_L, y1: PAD_T, x2: PAD_L, y2: H - PAD_B, stroke: '#1A1A1A', 'stroke-width': 1.5 }));
  // x-axis
  svg.appendChild(svgEl('line', { x1: PAD_L, y1: H - PAD_B, x2: W - PAD_R, y2: H - PAD_B, stroke: '#1A1A1A', 'stroke-width': 1.5 }));
  // y ticks
  for (let i = 0; i <= ticks; i++) {
    const v = yMin + (yMax - yMin) * (i / ticks);
    const y = H - PAD_B - innerH * (i / ticks);
    svg.appendChild(svgEl('line', { x1: PAD_L - 4, y1: y, x2: PAD_L, y2: y, stroke: '#1A1A1A', 'stroke-width': 1 }));
    const t = svgEl('text', { x: PAD_L - 6, y: y + 3, 'text-anchor': 'end', 'font-size': 9, 'font-family': 'Inter, sans-serif', 'font-weight': 700, fill: '#6B6B70' });
    t.textContent = (yMax >= 1000 ? Math.round(v) : v.toFixed(yMax < 10 ? 1 : 0));
    svg.appendChild(t);
    if (i > 0) {
      svg.appendChild(svgEl('line', { x1: PAD_L, y1: y, x2: W - PAD_R, y2: y, stroke: '#E8DFC8', 'stroke-width': 0.5 }));
    }
  }
  if (labelLeft) {
    const t = svgEl('text', { x: 4, y: PAD_T - 2, 'font-size': 8, 'font-family': 'Sora, sans-serif', 'font-weight': 900, fill: '#6B6B70', 'letter-spacing': 1 });
    t.textContent = labelLeft;
    svg.appendChild(t);
  }
  return { innerH, innerW };
}

function drawXLabels(svg, months) {
  const innerW = W - PAD_L - PAD_R;
  const step = innerW / Math.max(1, months.length - 1);
  const skip = months.length > 8 ? Math.ceil(months.length / 6) : 1;
  months.forEach((m, i) => {
    if (skip > 1 && i % skip !== 0 && i !== months.length - 1) return;
    const x = PAD_L + step * i;
    const t = svgEl('text', { x, y: H - PAD_B + 12, 'text-anchor': 'middle', 'font-size': 9, 'font-family': 'Inter, sans-serif', 'font-weight': 700, fill: '#6B6B70' });
    t.textContent = m;
    svg.appendChild(t);
  });
}

function renderBars(svg, months, values, yMin, yMax, opts={}) {
  clearSvg(svg);
  const { innerH, innerW } = drawAxes(svg, yMin, yMax, 4, opts.label || '');
  const step = innerW / months.length;
  const barW = step * 0.62;
  const pad = (step - barW) / 2;
  values.forEach((v, i) => {
    const clamped = Math.max(yMin, Math.min(yMax, v));
    const h = innerH * (clamped - yMin) / (yMax - yMin);
    const x = PAD_L + step * i + pad;
    const y = H - PAD_B - h;
    const color = opts.barColor || '#E5483D';
    const highlight = (opts.highlightStart != null && i >= opts.highlightStart && i <= opts.highlightEnd);
    svg.appendChild(svgEl('rect', { x, y, width: barW, height: h, fill: highlight ? '#FFB592' : color, stroke: '#1A1A1A', 'stroke-width': 1.5 }));
    if (opts.showValues && months.length <= 8) {
      const t = svgEl('text', { x: x + barW/2, y: y - 4, 'text-anchor': 'middle', 'font-size': 9, 'font-family': 'Sora, sans-serif', 'font-weight': 900, fill: '#1A1A1A' });
      t.textContent = v;
      svg.appendChild(t);
    }
  });
  drawXLabels(svg, months);
}

function renderLine(svg, months, values, yMin, yMax, opts={}) {
  clearSvg(svg);
  const { innerH, innerW } = drawAxes(svg, yMin, yMax, 4, opts.label || '');
  const step = innerW / Math.max(1, months.length - 1);
  let pathD = '';
  const pts = values.map((v, i) => {
    const clamped = Math.max(yMin, Math.min(yMax, v));
    const x = PAD_L + step * i;
    const y = H - PAD_B - innerH * (clamped - yMin) / (yMax - yMin);
    return [x, y];
  });
  pts.forEach((p, i) => { pathD += (i === 0 ? 'M' : 'L') + p[0] + ' ' + p[1] + ' '; });
  const color = opts.color || '#E5483D';
  svg.appendChild(svgEl('path', { d: pathD, fill: 'none', stroke: color, 'stroke-width': 3, 'stroke-linejoin': 'round', 'stroke-linecap': 'round' }));
  pts.forEach(p => {
    svg.appendChild(svgEl('circle', { cx: p[0], cy: p[1], r: 3.5, fill: color, stroke: '#1A1A1A', 'stroke-width': 1.5 }));
  });
  drawXLabels(svg, months);
}

function renderTwoLine(svg, months, valuesA, valuesB, yMinA, yMaxA, yMinB, yMaxB, opts={}) {
  clearSvg(svg);
  const innerH = H - PAD_T - PAD_B;
  const innerW = W - PAD_L - PAD_R;
  // axes
  svg.appendChild(svgEl('line', { x1: PAD_L, y1: PAD_T, x2: PAD_L, y2: H - PAD_B, stroke: '#1A1A1A', 'stroke-width': 1.5 }));
  svg.appendChild(svgEl('line', { x1: PAD_L, y1: H - PAD_B, x2: W - PAD_R, y2: H - PAD_B, stroke: '#1A1A1A', 'stroke-width': 1.5 }));
  // grid (just 4 lines)
  for (let i = 1; i <= 4; i++) {
    const y = H - PAD_B - innerH * (i / 4);
    svg.appendChild(svgEl('line', { x1: PAD_L, y1: y, x2: W - PAD_R, y2: y, stroke: '#E8DFC8', 'stroke-width': 0.5 }));
  }
  const step = innerW / Math.max(1, months.length - 1);
  const lineFromValues = (vals, yMin, yMax) => vals.map((v, i) => {
    const clamped = Math.max(yMin, Math.min(yMax, v));
    return [PAD_L + step * i, H - PAD_B - innerH * (clamped - yMin) / (yMax - yMin)];
  });
  const draw = (pts, color, label, dash) => {
    let d = '';
    pts.forEach((p, i) => { d += (i === 0 ? 'M' : 'L') + p[0] + ' ' + p[1] + ' '; });
    const attrs = { d, fill: 'none', stroke: color, 'stroke-width': 2.5, 'stroke-linejoin': 'round', 'stroke-linecap': 'round' };
    if (dash) attrs['stroke-dasharray'] = dash;
    svg.appendChild(svgEl('path', attrs));
    pts.forEach(p => svg.appendChild(svgEl('circle', { cx: p[0], cy: p[1], r: 2.5, fill: color, stroke: '#1A1A1A', 'stroke-width': 1 })));
  };
  draw(lineFromValues(valuesA, yMinA, yMaxA), opts.colorA || '#F472C8', opts.labelA);
  draw(lineFromValues(valuesB, yMinB, yMaxB), opts.colorB || '#7FCFEA', opts.labelB);
  if (opts.valuesC) draw(lineFromValues(opts.valuesC, opts.yMinC || yMinA, opts.yMaxC || yMaxA), opts.colorC || '#3FD68F', opts.labelC, '6 3');
  drawXLabels(svg, months);
  // legend
  const legY = PAD_T + 4;
  const legend = (x, color, label) => {
    svg.appendChild(svgEl('rect', { x, y: legY, width: 10, height: 8, fill: color, stroke: '#1A1A1A', 'stroke-width': 1 }));
    const t = svgEl('text', { x: x + 14, y: legY + 7, 'font-size': 9, 'font-family': 'Sora, sans-serif', 'font-weight': 800, fill: '#1A1A1A' });
    t.textContent = label;
    svg.appendChild(t);
  };
  if (opts.labelA) legend(PAD_L + 6, opts.colorA || '#F472C8', opts.labelA);
  if (opts.labelB) legend(PAD_L + 110, opts.colorB || '#7FCFEA', opts.labelB);
  if (opts.labelC && opts.valuesC) legend(PAD_L + 220, opts.colorC || '#3FD68F', opts.labelC);
}

function renderTwoBars(svg, labels, values, yMin, yMax, opts={}) {
  clearSvg(svg);
  const innerH = H - PAD_T - PAD_B;
  const innerW = W - PAD_L - PAD_R;
  // axes
  svg.appendChild(svgEl('line', { x1: PAD_L, y1: PAD_T, x2: PAD_L, y2: H - PAD_B, stroke: '#1A1A1A', 'stroke-width': 1.5 }));
  svg.appendChild(svgEl('line', { x1: PAD_L, y1: H - PAD_B, x2: W - PAD_R, y2: H - PAD_B, stroke: '#1A1A1A', 'stroke-width': 1.5 }));
  // y ticks
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yMax - yMin) * (i / 4);
    const y = H - PAD_B - innerH * (i / 4);
    svg.appendChild(svgEl('line', { x1: PAD_L - 4, y1: y, x2: PAD_L, y2: y, stroke: '#1A1A1A', 'stroke-width': 1 }));
    const t = svgEl('text', { x: PAD_L - 6, y: y + 3, 'text-anchor': 'end', 'font-size': 9, 'font-family': 'Inter, sans-serif', 'font-weight': 700, fill: '#6B6B70' });
    let label;
    if (yMax >= 1000000) label = (v/1000000).toFixed(0) + 'M';
    else if (yMax >= 1000) label = (v/1000).toFixed(0) + 'K';
    else label = v.toFixed(yMax < 10 ? 1 : 0);
    t.textContent = label;
    svg.appendChild(t);
    if (i > 0) {
      svg.appendChild(svgEl('line', { x1: PAD_L, y1: y, x2: W - PAD_R, y2: y, stroke: '#E8DFC8', 'stroke-width': 0.5 }));
    }
  }
  if (opts.label) {
    const t = svgEl('text', { x: 4, y: PAD_T - 2, 'font-size': 8, 'font-family': 'Sora, sans-serif', 'font-weight': 900, fill: '#6B6B70', 'letter-spacing': 1 });
    t.textContent = opts.label;
    svg.appendChild(t);
  }
  const step = innerW / labels.length;
  const barW = step * 0.55;
  const pad = (step - barW) / 2;
  values.forEach((v, i) => {
    const clamped = Math.max(yMin, Math.min(yMax, v));
    const h = innerH * (clamped - yMin) / (yMax - yMin);
    const x = PAD_L + step * i + pad;
    const y = H - PAD_B - h;
    const color = (opts.colors && opts.colors[i]) || '#E5483D';
    svg.appendChild(svgEl('rect', { x, y, width: barW, height: h, fill: color, stroke: '#1A1A1A', 'stroke-width': 1.5 }));
    // value label on top
    const tv = svgEl('text', { x: x + barW/2, y: y - 5, 'text-anchor': 'middle', 'font-size': 11, 'font-family': 'Sora, sans-serif', 'font-weight': 900, fill: '#1A1A1A' });
    if (opts.valueFormatter) tv.textContent = opts.valueFormatter(v);
    else tv.textContent = v;
    svg.appendChild(tv);
  });
  // x labels
  labels.forEach((m, i) => {
    const x = PAD_L + step * i + step/2;
    const t = svgEl('text', { x, y: H - PAD_B + 14, 'text-anchor': 'middle', 'font-size': 10, 'font-family': 'Sora, sans-serif', 'font-weight': 800, fill: '#1A1A1A' });
    t.textContent = m;
    svg.appendChild(t);
  });
}

// Single-correct MCQ. Re-selectable until correct. Wrong taps shake; spoiler only after 2nd wrong.
function setupMCQ(mcqId, fbId, nextId, opts={}) {
  const mcq = document.getElementById(mcqId);
  if (!mcq) return;
  let wrongCount = 0;
  let locked = false;
  mcq.querySelectorAll('.option').forEach(btn => {
    btn.addEventListener('click', () => {
      if (locked) return;
      const correct = btn.dataset.correct === 'true';
      if (correct) {
        SFX.correct();
        locked = true;
        mcq.querySelectorAll('.option').forEach(o => o.disabled = true);
        btn.classList.add('correct');
        if (fbId) {
          const fb = document.getElementById(fbId);
          if (fb) fb.classList.remove('hidden');
        }
        if (nextId) {
          const nxt = document.getElementById(nextId);
          if (nxt) nxt.disabled = false;
        }
        if (opts.onCorrect) opts.onCorrect();
      } else {
        SFX.wrong();
        btn.classList.add('wrong');
        setTimeout(() => btn.classList.remove('wrong'), 600);
        wrongCount++;
        if (opts.hints && wrongCount === 1 && fbId) {
          const fb = document.getElementById(fbId);
          if (fb) {
            fb.className = 'feedback hot';
            fb.textContent = opts.hints[0] || 'Not quite — look again.';
            fb.classList.remove('hidden');
          }
        }
        if (wrongCount >= 2 && fbId && opts.hints) {
          const fb = document.getElementById(fbId);
          if (fb) {
            fb.className = 'feedback amber';
            fb.textContent = opts.hints[1] || 'Look at the highlighted clue.';
            fb.classList.remove('hidden');
          }
        }
      }
    });
  });
}

// Multi-correct MCQ (checkbox). Pick all correct; submit via button.
function setupMultiMCQ(mcqId, checkBtnId, fbId, nextId, opts={}) {
  const mcq = document.getElementById(mcqId);
  if (!mcq) return;
  const checkBtn = document.getElementById(checkBtnId);
  const fb = fbId ? document.getElementById(fbId) : null;
  const nxt = nextId ? document.getElementById(nextId) : null;
  mcq.querySelectorAll('.option.multi').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      const pressed = btn.getAttribute('aria-pressed') === 'true';
      btn.setAttribute('aria-pressed', !pressed);
      btn.classList.toggle('selected', !pressed);
      btn.querySelector('.option-num').textContent = !pressed ? '✓' : '+';
      SFX.click();
      const anySelected = mcq.querySelectorAll('.option.multi.selected').length > 0;
      checkBtn.disabled = !anySelected;
    });
  });
  checkBtn.addEventListener('click', () => {
    let allCorrect = true;
    mcq.querySelectorAll('.option.multi').forEach(btn => {
      const shouldBeSelected = btn.dataset.correct === 'true';
      const isSelected = btn.classList.contains('selected');
      btn.classList.remove('selected');
      btn.disabled = true;
      btn.querySelector('.option-num').textContent = shouldBeSelected ? '✓' : '✗';
      if (shouldBeSelected && isSelected) btn.classList.add('correct');
      else if (!shouldBeSelected && isSelected) { btn.classList.add('wrong'); allCorrect = false; }
      else if (shouldBeSelected && !isSelected) { btn.classList.add('missed'); allCorrect = false; }
    });
    checkBtn.disabled = true;
    if (allCorrect) SFX.correct(); else SFX.soft();
    if (fb) fb.classList.remove('hidden');
    if (nxt) nxt.disabled = false;
    if (opts.onSubmit) opts.onSubmit(allCorrect);
  });
}

// Explore phase — kid taps each option to hear Lens's take. After tapsNeeded, reveal phase 2.
function setupExplore(mcqId, reactionId, phase2Id, tapsNeeded=2) {

  mcq.querySelectorAll('.option.explore').forEach(btn => {

      btn.classList.add('seen');

// Commit phase — kid picks the strongest lead. Re-selectable until commit button.
function setupCommit(commitId, commitBtnId, fbId, nextId) {
  const commit = document.getElementById(commitId);
  if (!commit) return;
  const commitBtn = document.getElementById(commitBtnId);
  const fb = fbId ? document.getElementById(fbId) : null;
  const nxt = nextId ? document.getElementById(nextId) : null;
  let done = false;
  commit.querySelectorAll('.option.commit').forEach(btn => {
    btn.addEventListener('click', () => {
      if (done) return;
      commit.querySelectorAll('.option.commit').forEach(o => {
        o.classList.remove('selected');
        o.classList.remove('wrong');
        o.querySelector('.option-num').textContent = '○';
      });
      btn.classList.add('selected');
      btn.querySelector('.option-num').textContent = '●';
      commitBtn.disabled = false;
      if (fb) fb.classList.add('hidden');
      SFX.click();
    });
  });
  commitBtn.addEventListener('click', () => {
    if (done) return;
    const selected = commit.querySelector('.option.commit.selected');
    if (!selected) return;
    const isKey = selected.dataset.key === 'true';
    if (isKey) {
      SFX.correct();
      done = true;
      selected.classList.remove('selected');
      selected.classList.add('correct');
      selected.querySelector('.option-num').textContent = '✓';
      commit.querySelectorAll('.option.commit').forEach(o => o.disabled = true);
      commitBtn.disabled = true;
      commitBtn.textContent = 'Lead confirmed ✓';
      if (fb) {
        fb.classList.remove('hidden');
        fb.className = 'feedback';
        fb.innerHTML = '<strong>Good lead.</strong> Let\'s follow it.';
      }
      if (nxt) nxt.disabled = false;
    } else {
      SFX.wrong();
      selected.classList.add('wrong');
      setTimeout(() => selected.classList.remove('wrong'), 600);
      if (fb) {
        fb.classList.remove('hidden');
        fb.className = 'feedback hot';
        fb.innerHTML = 'That\'s a real observation — but it\'s not the strongest lead. Look again at the chart structure.';
      }
    }
  });
}

// Integer input — kid types number, taps check. Wrong → directional hint. Right → unlock next.
function setupIntegerInput(inputId, checkBtnId, fbId, nextId, correctVal, opts={}) {
  const input = document.getElementById(inputId);
  const check = document.getElementById(checkBtnId);
  const fb = fbId ? document.getElementById(fbId) : null;
  const nxt = nextId ? document.getElementById(nextId) : null;
  if (!input || !check) return;
  let wrongCount = 0;
  let locked = false;

  const validate = () => {
    check.disabled = !input.value.trim();
  };
  input.addEventListener('input', validate);
  validate();

  check.addEventListener('click', () => {
    if (locked) return;
    const v = parseInt(input.value, 10);
    if (Number.isNaN(v)) return;
    const tolerance = opts.tolerance || 0;
    const ok = Math.abs(v - correctVal) <= tolerance;
    if (ok) {
      SFX.correct();
      locked = true;
      input.classList.add('correct');
      input.disabled = true;
      check.disabled = true;
      if (fb) {
        fb.className = 'feedback';
        fb.innerHTML = opts.successText || `<strong>That\'s right.</strong> ${correctVal}.`;
        fb.classList.remove('hidden');
      }
      if (nxt) nxt.disabled = false;
      if (opts.onCorrect) opts.onCorrect();
    } else {
      SFX.wrong();
      wrongCount++;
      input.classList.add('wrong');
      setTimeout(() => input.classList.remove('wrong'), 600);
      if (fb) {
        if (wrongCount === 1) {
          fb.className = 'feedback hot';
          const dir = v > correctVal ? 'too high' : 'too low';
          fb.innerHTML = opts.hint1 ? opts.hint1.replace('{dir}', dir) : `Not quite — your guess is ${dir}.`;
          fb.classList.remove('hidden');
        } else {
          fb.className = 'feedback amber';
          fb.innerHTML = opts.hint2 || `The answer is <strong>${correctVal}</strong>. Let\'s move on.`;
          fb.classList.remove('hidden');
          // unlock after second wrong attempt — don't gate forever
          input.value = correctVal;
          input.classList.remove('wrong');
          input.classList.add('correct');
          input.disabled = true;
          check.disabled = true;
          locked = true;
          if (nxt) nxt.disabled = false;
          if (opts.onCorrect) opts.onCorrect();
        }
      }
    }
  });
}

// Slider — drag from start to target. onChange fires with current value. atTarget unlocks next.
function setupSlider(sliderId, displayId, fbId, nextId, opts={}) {
  const slider = document.getElementById(sliderId);
  const display = displayId ? document.getElementById(displayId) : null;
  const fb = fbId ? document.getElementById(fbId) : null;
  const nxt = nextId ? document.getElementById(nextId) : null;
  if (!slider) return;
  let atTargetOnce = false;
  let lastTickVal = parseFloat(slider.value);
  const updateAll = () => {
    const v = parseFloat(slider.value);
    if (display && opts.format) display.textContent = opts.format(v);
    else if (display) display.textContent = v;
    if (Math.abs(v - lastTickVal) >= (opts.tickEvery || 0.3)) {
      SFX.tick();
      lastTickVal = v;
    }
    if (opts.onChange) opts.onChange(v);
    const inTarget = (v >= opts.targetMin && v <= opts.targetMax);
    if (inTarget && !atTargetOnce) {
      atTargetOnce = true;
      SFX.correct();
      if (fb) {
        fb.className = 'feedback';
        fb.innerHTML = opts.atTargetText || '<strong>Got it.</strong>';
        fb.classList.remove('hidden');
      }
      if (nxt) nxt.disabled = false;
      if (opts.onTarget) opts.onTarget(v);
    } else if (!inTarget && fb && !atTargetOnce) {
      fb.className = 'feedback hot';
      fb.innerHTML = opts.notYetText || 'Keep going…';
      fb.classList.remove('hidden');
    }
  };
  slider.addEventListener('input', updateAll);
  updateAll();
}

}

function mountChart4(sub) {

    setupCommit('commit-c4', 'commit-c4-btn', 'fb-commit-c4', 'next-c4-1');
  }
  if (sub === 2) setupMCQ('mcq-c4-comp', 'fb-c4-comp', 'next-c4-2');
  if (sub === 3) {
    setupIntegerInput('num-c4-sam', 'check-c4-sam', 'fb-c4-sam', null, 4, {
      successText: '<strong>4 squares.</strong> Samsung = 4 area units.',
      hint1: 'A 2×2 square. Multiply.',
      hint2: 'Samsung is 2 wide × 2 tall = <strong>4 squares</strong>.',
      onCorrect: () => {
        document.getElementById('num-c4-iph').disabled = false;
        document.getElementById('check-c4-iph').disabled = false;
      }
    });
    // chain second integer input
    const iphCheck = document.getElementById('check-c4-iph');
    const iphInput = document.getElementById('num-c4-iph');
    const iphFb = document.getElementById('fb-c4-iph');
    const next = document.getElementById('next-c4-3');
    let iphLocked = false;
    let wrongCount = 0;
    iphInput.addEventListener('input', () => { iphCheck.disabled = !iphInput.value.trim(); });
    iphCheck.disabled = true;
    iphCheck.addEventListener('click', () => {
      if (iphLocked) return;
      const v = parseInt(iphInput.value, 10);
      if (v === 16) {
        SFX.correct();
        iphLocked = true;
        iphInput.classList.add('correct');
        iphInput.disabled = true;
        iphCheck.disabled = true;
        iphFb.className = 'feedback';
        iphFb.innerHTML = '<strong>16 squares.</strong> iPhone = 16 area units. So visually the iPhone takes <strong>4× the space</strong>, not 2×.';
        iphFb.classList.remove('hidden');
        next.disabled = false;
      } else {
        SFX.wrong();
        wrongCount++;
        iphInput.classList.add('wrong');
        setTimeout(() => iphInput.classList.remove('wrong'), 600);
        iphFb.classList.remove('hidden');
        if (wrongCount === 1) {
          iphFb.className = 'feedback hot';
          iphFb.innerHTML = `Your guess is ${v > 16 ? 'too high' : 'too low'}. iPhone is 4 wide × 4 tall.`;
        } else {
          iphFb.className = 'feedback amber';
          iphFb.innerHTML = 'iPhone is <strong>16 squares</strong> (4 × 4). Moving on.';
          iphInput.value = 16;
          iphInput.classList.remove('wrong');
          iphInput.classList.add('correct');
          iphInput.disabled = true;
          iphCheck.disabled = true;
          iphLocked = true;
          next.disabled = false;
        }
      }
    });
  }
  if (sub === 4) setupMCQ('mcq-c4-mis', 'fb-c4-mis', 'next-c4-4', { hints: ['Which one came from the official source?', 'The data (2×) is the truth. The picture is the rhetoric.'] });
  if (sub === 5) setupMultiMCQ('multi-c4-why', 'check-c4-why', 'fb-c4-why', 'next-c4-5');
  if (sub === 6) {
    const slider = document.getElementById('slider-c4');
    const display = document.getElementById('slider-c4-val');
    const fixHead = document.getElementById('c4-fix-x');
    const fb = document.getElementById('fb-c4-fix');
    const nxt = document.getElementById('next-c4-6');
    let atTarget = false;
    let lastTick = 2.0;
    const upd = () => {
      const v = parseFloat(slider.value);
      const area = (v * v).toFixed(2);
      display.textContent = v.toFixed(2) + '×';
      fixHead.textContent = area;
      const picto = document.getElementById('c4-fix-picto');
      if (picto) picto.innerHTML = pictoBox(1, v);
      if (Math.abs(v - lastTick) >= 0.05) { SFX.tick(); lastTick = v; }
      const inTarget = (v >= 1.39 && v <= 1.43);
      if (inTarget && !atTarget) {
        atTarget = true;
        SFX.correct();
        fb.className = 'feedback';
        fb.innerHTML = `<strong>Got it. Scale ≈ 1.41 (that's √2).</strong> To double the area, you scale each side by √2 — not by 2. That's the math the picture skipped.`;
        nxt.disabled = false;
      } else if (!inTarget && !atTarget) {
        fb.className = 'feedback hot';
        fb.innerHTML = v > 1.43 ? `Area is <strong>${area}×</strong>. Keep shrinking.` : `Area is <strong>${area}×</strong>. Slightly too small.`;
      }
    };
    slider.addEventListener('input', upd);
    upd();
  }
  if (sub === 7) setupMCQ('mcq-c4-name', 'fb-c4-name', 'next-c4-7', {
    onCorrect: () => {
      toolsEarned.picture = true;
      SFX.tool();
      const kit = document.getElementById('kit-c4');
      if (kit) kit.outerHTML = '<div id="kit-c4" style="margin-top:10px;">' + toolkitStrip() + '</div>';
    }
  });
}

          ${mcqOpt('A', '🔍 The Axis Trick — y-axis doesn\'t start at 0', true)}
          ${mcqOpt('B', '📅 The Time Window Trick — too short a window', false)}
          ${mcqOpt('C', '🔗 The Third Thing Trick — hidden variable', false)}
          ${mcqOpt('D', '🖼 The Picture Trick — misleading visual sizes', false)}
        </div>
      </div>
      <div class="feedback hidden" id="fb-fin-diag"><strong>Right.</strong> Look at the y-axis — it starts at 6.0, not 0. That\'s how a 0.3-hour jump becomes "skyrocket" in the visuals.</div>
      <button class="btn" id="next-fin-1" disabled onclick="nextSub()">Fix the chart →</button>
    </div>`;

  if (sub === 2) return `
    <div class="frame">
      <span class="eyebrow">Step 2 · Fix it</span>
      <h1 class="step-title">Pull the y-axis baseline to <strong>0</strong>.</h1>
      <div class="news-block" id="fin-fix-block">
        <div class="byline" id="fin-byline">PARENTING TIMES · DISHONEST VERSION</div>
        <div class="headline" id="fin-headline">TEEN SCREEN TIME <span class="hot">SKYROCKETS!</span></div>
        <div class="subhead" id="fin-subhead">New study shocks parents.</div>
        <svg class="chart" id="fin-fix" viewBox="0 0 360 220" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="slider-row">
        <span class="slider-label">Y starts at</span>
        <input class="slider" id="slider-fin" type="range" min="0" max="6" step="0.1" value="6">
        <span class="slider-value" id="slider-fin-val">6.0 hrs</span>
      </div>
      <div class="feedback hot" id="fb-fin-fix">Dishonest scale. This year's bar looks like a mountain. Keep dragging…</div>
      <button class="btn" id="next-fin-2" disabled onclick="nextSub()">Rewrite the headline →</button>
    </div>`;

  if (sub === 3) return `
    <div class="frame">
      <span class="eyebrow">Step 3 · Rewrite</span>
      <h1 class="step-title">The chart is honest now. Pick the headline that matches.</h1>
      <div class="news-block honest">
        <div class="byline">PARENTING TIMES · HONEST VERSION</div>
        <div class="headline" style="color: var(--ink);">Teen screen time up slightly</div>
        <div class="subhead">5.9 → 6.4 hrs/day over 2 years. Roughly 8% more.</div>
        <svg class="chart" id="fin-rewrite" viewBox="0 0 360 220" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="q">
        <div class="options" id="mcq-fin-rewrite">
          ${mcqOpt('A', 'Teen screen time up about 8% over 2 years', true)}
          ${mcqOpt('B', 'Teens addicted to phones — screen time exploding', false)}
          ${mcqOpt('C', 'Teens drop screen time — returning to books', false)}
          ${mcqOpt('D', 'Teens spend 2× more time on screens', false)}
        </div>
      </div>
      <div class="feedback hidden" id="fb-fin-rewrite"><strong>Perfect.</strong> "About 8%" is calm and accurate. No fake drama. <em>That\'s</em> what honest reporting looks like.</div>
      <button class="btn" id="next-fin-3" disabled onclick="markAndGoto(7, 8)">Send to press →</button>
    </div>`;

  return '';
}

function mountFinale(sub) {
  if (sub === 0) {
    renderBars(document.getElementById('fin-intro'), DATA.screenTime.months, DATA.screenTime.values, 5.5, 6.5, { label: 'AVG HOURS/DAY', barColor: '#E5483D', showValues: true });
  }
  if (sub === 1) {
    renderBars(document.getElementById('fin-diag'), DATA.screenTime.months, DATA.screenTime.values, 5.5, 6.5, { label: 'AVG HOURS/DAY', barColor: '#E5483D', showValues: true });
    setupMCQ('mcq-fin-diag', 'fb-fin-diag', 'next-fin-1', { hints: ['Look at where the y-axis starts.', 'The y-axis starts at 5.5 instead of 0 — that\'s the Axis Trick.'] });
  }
  if (sub === 2) {
    const slider = document.getElementById('slider-fin');
    const display = document.getElementById('slider-fin-val');
    const fb = document.getElementById('fb-fin-fix');
    const byline = document.getElementById('fin-byline');
    const headline = document.getElementById('fin-headline');
    const subhead = document.getElementById('fin-subhead');
    const block = document.getElementById('fin-fix-block');
    const nxt = document.getElementById('next-fin-2');
    let atZero = false;
    let lastTick = 6.0;
    const upd = () => {
      const v = parseFloat(slider.value);
      display.textContent = v.toFixed(1) + ' hrs';
      renderBars(document.getElementById('fin-fix'), DATA.screenTime.months, DATA.screenTime.values, v, 6.5, {
        label: 'AVG HOURS/DAY',
        barColor: v === 0 ? '#3FD68F' : '#E5483D',
        showValues: true
      });
      if (Math.abs(v - lastTick) >= 0.5) { SFX.tick(); lastTick = v; }
      if (v === 0 && !atZero) {
        atZero = true;
        SFX.correct();
        fb.className = 'feedback';
        fb.innerHTML = '<strong>Honest scale.</strong> Bars are nearly the same height. Real change: about 0.5 hrs over 2 years. ~8% — not a "skyrocket."';
        block.classList.remove('dishonest');
        block.classList.add('honest');
        byline.textContent = 'PARENTING TIMES · HONEST VERSION';
        headline.innerHTML = 'Teen screen time up slightly';
        subhead.textContent = '5.9 → 6.4 hrs/day. About 8% over 2 years.';
        nxt.disabled = false;
      } else if (v > 0) {
        fb.className = 'feedback hot';
        fb.innerHTML = v >= 4 ? 'Pull lower — keep going.' : 'Almost. All the way to 0.';
      }
    };
    slider.addEventListener('input', upd);
    upd();
  }
  if (sub === 3) {
    renderBars(document.getElementById('fin-rewrite'), DATA.screenTime.months, DATA.screenTime.values, 0, 6.5, { label: 'AVG HOURS/DAY', barColor: '#3FD68F', showValues: true });
    setupMCQ('mcq-fin-rewrite', 'fb-fin-rewrite', 'next-fin-3', { hints: ['Match the calm number, not the drama.', 'About 8% — no exaggeration.'] });
  }
}
/* ═════════════════════════════════════════════════
   COMPLETION
   ═════════════════════════════════════════════════ */
function renderCompletion() {
  return `
    <div class="complete-hero">
      <div class="badge">CASE CLOSED</div>
      <h1>You caught the liars.</h1>
      <p>Every chart had correct numbers. The lies lived in the framing. You've built a toolkit you can use on every chart you see — TV, Instagram, anywhere.</p>
    </div>
    ${lensBubble('Great work, partner. You earned the tools the hard way. Next time someone shows you a chart, you\'ll see right through it.')}
    <div class="evidence-title">🛠 Your BS Detector Toolkit</div>
    <div class="tool-grid">
      ${CHALLENGE.tools.map(t => `
        <div class="tool-card ${toolsEarned[t.id] ? '' : 'locked'}">
          <div class="emoji">${t.icon}</div>
          <div class="name">${t.name}</div>
        </div>
      `).join('')}
    </div>
    <div class="share-card">
      <h4>I caught 4 lies before they hit the front page.</h4>
      <p>Can you? → Fake Chart Detective, a Real Math League case.</p>
    </div>
    <div class="nav-row">
      <button class="btn secondary" onclick="window.location.reload()">↻ Try again</button>
      <button class="btn coral" onclick="window.location.href='./index-v2.html'">Next case →</button>
    </div>`;
}
function mountCompletion() {}

/* ═════════════════════════════════════════════════
   PRIMITIVES
   ═════════════════════════════════════════════════ */
function lensBubble(text) {
  return `<div class="lens-row"><div class="lens-mascot">🔍</div><div class="lens-bubble"><div class="lens-name">LENS · DETECTIVE</div>${text}</div></div>`;
}

function newsBlock(byline, headline, subhead, chartId, kind='dishonest') {
  return `<div class="news-block ${kind}">
    <div class="byline">${byline}</div>
    <div class="headline">${headline}</div>
    ${subhead ? `<div class="subhead">${subhead}</div>` : ''}
    ${chartId ? `<svg class="chart" id="${chartId}" viewBox="0 0 360 220" preserveAspectRatio="xMidYMid meet"></svg>` : ''}
  </div>`;
}

function progressDots(total, current) {
  let html = '<div class="progress-wrap-inline" style="display:flex;gap:4px;margin-bottom:14px;">';
  for (let i = 0; i < total; i++) {
    const cls = i < current ? 'active' : (i === current ? 'current' : '');
    html += `<div class="progress-dot ${cls}" style="flex:1;height:5px;border:1px solid var(--ink);background:${i < current ? 'var(--bold-mint)' : (i === current ? 'var(--yellow)' : 'var(--line)')};"></div>`;
  }
  return html + '</div>';
}

function toolkitStrip() {
  let html = '<div class="toolkit-strip">';
  CHALLENGE.tools.forEach(t => {
    const cls = toolsEarned[t.id] ? 'earned' : '';
    html += `<span class="tool-chip ${cls}">${t.icon} ${t.name}</span>`;
  });
  return html + '</div>';
}

function mcqOpt(letter, text, isCorrect) {
  return `<button class="option" data-correct="${isCorrect}"><span class="option-num">${letter}</span><span class="body">${text}</span></button>`;
}
function multiOpt(text, isCorrect) {
  return `<button class="option multi" data-correct="${isCorrect}" aria-pressed="false"><span class="option-num">+</span><span class="body">${text}</span></button>`;
}
function exploreOpt(text, reaction, isKey=false) {
  return `<button class="option explore" data-key="${isKey}" data-react="${reaction.replace(/"/g, '&quot;')}"><span class="option-num">👁</span><span class="body">${text}</span></button>`;
}
function commitOpt(text, isKey) {
  return `<button class="option commit" data-key="${isKey}"><span class="option-num">○</span><span class="body">${text}</span></button>`;
}
function chip(text, value, isCorrect) {
  return `<button class="chip" data-value="${value}" data-correct="${isCorrect}">${text}</button>`;
}
function candidateBtn(emoji, text, isKey) {
  return `<button class="candidate" data-key="${isKey}"><span class="candidate-emoji">${emoji}</span><span class="body">${text}</span></button>`;
}

/* ═════════════════════════════════════════════════
   NAVIGATION
   ═════════════════════════════════════════════════ */
function syncScreenURL() {
  try {
    const url = new URL(window.location.href);
    url.searchParams.set('screen', currentSection + 1);
    window.history.replaceState({}, '', url.toString());
  } catch (e) {}
}
function getScreenFromURL() {
  const raw = new URLSearchParams(window.location.search).get('screen');
  if (raw === null) return null;
  const s = parseInt(raw, 10);
  if (Number.isNaN(s) || s < 1 || s > CHALLENGE.sections.length) return null;
  return s - 1;
}
function gotoSection(idx) {
  if (idx < 0 || idx >= CHALLENGE.sections.length) return;
  SFX.click();
  currentSection = idx;
  currentSubStep = 0;
  syncScreenURL();
  closeModal();
  render();
}
function markAndGoto(markIdx, goIdx) {
  completedSections.add(markIdx);
  gotoSection(goIdx);
}
function nextSub() {
  SFX.click();
  currentSubStep += 1;
  render();
}
function prevSub() {
  SFX.click();
  if (currentSubStep > 0) currentSubStep -= 1;
  render();
}
function setStep(s) {
  currentSubStep = s;
  render();
}

/* ═════════════════════════════════════════════════
   SECTION LIST MODAL
   ═════════════════════════════════════════════════ */
function openModal() {
  const list = document.getElementById('modal-list');
  let html = '';
  CHALLENGE.sections.forEach((s, i) => {
    const cur = i === currentSection ? 'current' : '';
    const done = completedSections.has(i) ? 'done' : '';
    html += `<div class="modal-item ${cur} ${done}" data-idx="${i}">
      <div class="modal-num"><span class="modal-num-text">${i+1}</span></div>
      <div>${s.title}</div>
    </div>`;
  });
  list.innerHTML = html;
  list.querySelectorAll('.modal-item').forEach(el => {
    el.addEventListener('click', () => gotoSection(parseInt(el.dataset.idx)));
  });
  document.getElementById('section-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('section-modal').classList.remove('open');
}
document.getElementById('section-pill').addEventListener('click', openModal);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('section-modal').addEventListener('click', e => {
  if (e.target.id === 'section-modal') closeModal();
});
document.getElementById('mute-btn').addEventListener('click', e => {
  muted = !muted;
  e.currentTarget.textContent = muted ? '🔇' : '🔊';
});
document.getElementById('restart-btn').addEventListener('click', () => {
  if (confirm('Restart from the beginning?')) {
    toolsEarned = {};
    completedSections = new Set();
    answers = {};
    newsroomVerdicts = {};
    currentSection = 0;
    currentSubStep = 0;
    syncScreenURL();
    render();
  }
});

/* ═════════════════════════════════════════════════
   DISPATCH
   ═════════════════════════════════════════════════ */
function render() {
  const s = CHALLENGE.sections[currentSection];
  const main = document.getElementById('main');
  let html = '';
  if (s.kind === 'intro') html = renderIntro();
  else if (s.kind === 'chart') html = renderChart(currentSection, currentSubStep);
  else if (s.kind === 'newsroom') html = renderNewsroom(currentSubStep);
  else if (s.kind === 'finale') html = renderFinale(currentSubStep);
  else if (s.kind === 'completion') html = renderCompletion();
  main.innerHTML = html;

  // top progress (per-section sub-step progress within the section)
  const pw = document.getElementById('progress-wrap');
  if (s.kind === 'chart' || s.kind === 'newsroom' || s.kind === 'finale') {
    const total = s.subSteps;
    let dots = '';
    for (let i = 0; i < total; i++) {
      const cls = i < currentSubStep ? 'active' : (i === currentSubStep ? 'current' : '');
      dots += `<div class="progress-dot ${cls}"></div>`;
    }
    pw.innerHTML = dots;
  } else {
    pw.innerHTML = '';
  }

  // section pill
  const pill = document.getElementById('section-pill');
  pill.innerHTML = `${s.title} <span class="arrow">▾</span>`;

  // mount any post-render handlers
  if (s.kind === 'chart') mountChart(currentSection, currentSubStep);
  if (s.kind === 'newsroom') mountNewsroom(currentSubStep);
  if (s.kind === 'finale') mountFinale(currentSubStep);
  if (s.kind === 'intro') mountIntro();
  if (s.kind === 'completion') mountCompletion();

  window.scrollTo({ top: 0, behavior: 'instant' });
}

function renderChart(idx, sub) {
  const s = CHALLENGE.sections[idx];
  if (s.id === 'chart-1') return renderChart1(sub);
  if (s.id === 'chart-2') return renderChart2(sub);
  if (s.id === 'chart-3') return renderChart3(sub);
  if (s.id === 'chart-4') return renderChart4(sub);
  if (s.id === 'chart-5') return renderChart5(sub);
  return '<div class="frame">Section not found.</div>';
}
function mountChart(idx, sub) {
  const s = CHALLENGE.sections[idx];
  if (s.id === 'chart-1') mountChart1(sub);
  if (s.id === 'chart-2') mountChart2(sub);
  if (s.id === 'chart-3') mountChart3(sub);
  if (s.id === 'chart-4') mountChart4(sub);
  if (s.id === 'chart-5') mountChart5(sub);
}

/* ═════════════════════════════════════════════════
   INIT
   ═════════════════════════════════════════════════ */
const _urlScreen = getScreenFromURL();
if (_urlScreen !== null) currentSection = _urlScreen;
syncScreenURL();
render();
</script>
</body>
