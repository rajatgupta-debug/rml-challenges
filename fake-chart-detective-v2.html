<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fake Chart Detective — RML</title>
<style>
/* ══════════════════════════════════════════════════════════
   DESIGN SYSTEM — warm, cozy, detective-notebook palette
   ══════════════════════════════════════════════════════════ */
:root {
  --bg: #FBF5E8;
  --bg-2: #F5EDD8;
  --card: #FFFFFF;
  --border: #E8DFC8;
  --border-strong: #C9BE9F;
  --shadow: 0 6px 24px rgba(60, 45, 30, 0.08);
  --shadow-lift: 0 12px 40px rgba(60, 45, 30, 0.14);

  --text: #2B2320;
  --text-2: #5E544D;
  --text-3: #99908A;

  --mint: #2EB39E;
  --mint-2: #5FC9B5;
  --mint-bg: #DFF5EF;
  --mint-ink: #1A6A5C;

  --coral: #E85D75;
  --coral-bg: #FDE7EB;
  --coral-ink: #B72F47;

  --orange: #F99B4E;
  --orange-bg: #FDECDB;

  --yellow: #F4C430;
  --yellow-bg: #FDF3CA;

  --purple: #8E6FD8;
  --purple-bg: #EFE8FC;

  --navy: #2B3861;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Nunito", "SF Pro Rounded", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-weight: 600;
  line-height: 1.4;
}

/* ══════════════════════════════════════════════════════════
   LAYOUT
   ══════════════════════════════════════════════════════════ */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 900;
  font-size: 17px;
  color: var(--text);
}
.topbar-brand .logo {
  background: var(--coral);
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
}
.topbar-meta { font-size: 13px; color: var(--text-3); font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.mute-btn {
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.15s;
}
.mute-btn:hover { transform: scale(1.08); background: var(--yellow-bg); }

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  max-width: 1200px;
  margin: 0 auto;
  min-height: calc(100vh - 60px);
}
.sidebar {
  padding: 28px 16px 40px;
  border-right: 1px solid var(--border);
  background: var(--bg);
}
.sidebar h4 {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-3);
  margin: 0 12px 10px;
  font-weight: 900;
  text-transform: uppercase;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-2);
  transition: all 0.15s;
  margin-bottom: 3px;
  border: 2px solid transparent;
}
.nav-item:hover { background: var(--bg-2); color: var(--text); }
.nav-item.current {
  background: var(--mint-bg);
  color: var(--mint-ink);
  border-color: var(--mint);
}
.nav-item.done { color: var(--text); }
.nav-num {
  background: var(--border);
  color: var(--text-2);
  width: 26px; height: 26px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 900;
  flex-shrink: 0;
}
.nav-item.current .nav-num { background: var(--mint); color: white; }
.nav-item.done .nav-num { background: var(--mint-bg); color: var(--mint-ink); }
.nav-item.done .nav-num::before { content: "✓"; }
.nav-item.done .nav-num-text { display: none; }

.main {
  padding: 32px 40px 60px;
  min-width: 0;
}
.frame {
  background: var(--card);
  border-radius: 0;
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  max-width: 760px;
  margin: 0 auto;
}

/* ══════════════════════════════════════════════════════════
   PROGRESS BAR
   ══════════════════════════════════════════════════════════ */
.progress-wrap { display: flex; gap: 5px; margin-bottom: 22px; }
.progress-dot {
  flex: 1; height: 6px;
  background: var(--border);
  border-radius: 3px;
  transition: background 0.4s;
}
.progress-dot.active { background: var(--mint); }
.progress-dot.current { background: var(--orange); }

.step-label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mint-ink);
  margin-bottom: 6px;
}
.step-title {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 18px;
  line-height: 1.25;
  letter-spacing: -0.3px;
}

/* ══════════════════════════════════════════════════════════
   MASCOT + BUBBLE
   ══════════════════════════════════════════════════════════ */
.mascot-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  margin-bottom: 18px;
}
.mascot {
  flex-shrink: 0;
  width: 72px; height: 72px;
}
.mascot svg { width: 100%; height: 100%; }
.bubble {
  flex: 1;
  background: var(--purple-bg);
  border: 2px solid var(--purple);
  border-radius: 0;
  padding: 14px 18px;
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.5;
  position: relative;
}
.bubble::before {
  content: "";
  position: absolute;
  left: -10px; top: 18px;
  width: 0; height: 0;
  border: 10px solid transparent;
  border-right-color: var(--purple);
  border-left: 0;
}
.bubble::after {
  content: "";
  position: absolute;
  left: -7px; top: 20px;
  width: 0; height: 0;
  border: 8px solid transparent;
  border-right-color: var(--purple-bg);
  border-left: 0;
}
.bubble .name {
  color: var(--purple);
  font-weight: 900;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 3px;
}

/* ══════════════════════════════════════════════════════════
   NEWS BLOCK
   ══════════════════════════════════════════════════════════ */
.news-block {
  background: var(--bg-2);
  border-radius: 0;
  padding: 22px 22px 18px;
  margin-bottom: 18px;
  border: 1px solid var(--border);
}
.byline { font-size: 10px; letter-spacing: 2px; color: var(--text-3); margin-bottom: 8px; font-weight: 900; }
.headline {
  font-size: 28px;
  font-weight: 900;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}
.headline .hot { color: var(--coral); }
.subhead { font-size: 15px; color: var(--text-2); margin-bottom: 14px; line-height: 1.4; font-weight: 600; }

svg.chart { width: 100%; height: auto; display: block; }

/* ══════════════════════════════════════════════════════════
   QUESTIONS + OPTIONS
   ══════════════════════════════════════════════════════════ */
.question {
  background: var(--yellow-bg);
  border: 2px solid var(--border);
  border-radius: 0;
  padding: 18px 20px;
  margin-bottom: 14px;
}
.q-label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1.5px;
  color: var(--orange);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.q-text {
  font-size: 17px;
  color: var(--text);
  font-weight: 800;
  margin-bottom: 14px;
  line-height: 1.35;
}
.q-hint {
  font-size: 13px;
  color: var(--text-2);
  font-weight: 700;
  margin-bottom: 12px;
  font-style: italic;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 0;
  padding: 14px 16px;
  color: var(--text);
  font-size: 15px;
  font-weight: 700;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  line-height: 1.4;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.option-num {
  background: var(--bg-2);
  color: var(--text-2);
  width: 26px; height: 26px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 900;
  flex-shrink: 0;
}
.option:hover:not(:disabled) { border-color: var(--mint-2); transform: translateY(-1px); box-shadow: var(--shadow); }
.option.selected { border-color: var(--mint); background: var(--mint-bg); }
.option.correct { border-color: var(--mint); background: var(--mint-bg); color: var(--mint-ink); }
.option.correct .option-num { background: var(--mint); color: white; }
.option.wrong { border-color: var(--coral); background: var(--coral-bg); color: var(--coral-ink); animation: shake 0.4s; }
.option.missed { border-color: var(--yellow); background: var(--yellow-bg); }
.option.missed::after { content: " (missed)"; color: var(--text-3); font-size: 12px; margin-left: auto; }
.option:disabled { cursor: default; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* Multi-select checkbox style */
.option.multi .option-num {
  border-radius: 6px;
  background: white;
  border: 2px solid var(--border-strong);
  color: transparent;
  font-size: 16px;
}
.option.multi.selected .option-num {
  background: var(--mint);
  border-color: var(--mint);
  color: white;
}
.option.multi.selected .option-num::before { content: "✓"; }
.option.multi.correct .option-num { background: var(--mint); border-color: var(--mint); color: white; }
.option.multi.correct .option-num::before { content: "✓"; }
.option.multi.wrong .option-num { background: var(--coral); border-color: var(--coral); color: white; }
.option.multi.wrong .option-num::before { content: "✕"; }

/* Phase 1 — explore (tap to hear Lens react; all taps look the same) */
.option.explore {}
.option.explore.seen { border-color: var(--purple); background: var(--purple-bg); color: var(--text); }
.option.explore.seen .option-num { background: var(--purple); color: white; border-color: var(--purple); }
.option.explore.seen .option-num::before { content: "👁"; font-size: 12px; }

/* Phase 2 — commit to a lead (radio-style, deliberate choice) */
.question.phase2 { background: var(--orange-bg); border-color: var(--orange); border-left: 4px solid var(--orange); }
.question.phase2 .q-label { color: var(--coral); }
.option.commit .option-num { border-radius: 50%; background: white; border: 2px solid var(--border-strong); }
.option.commit.selected { border-color: var(--orange); background: #FFE4C4; }
.option.commit.selected .option-num { background: var(--orange); border-color: var(--orange); }
.option.commit.selected .option-num::before { content: "●"; color: white; font-size: 14px; }
.option.commit.correct { border-color: var(--mint); background: var(--mint-bg); color: var(--mint-ink); }
.option.commit.correct .option-num { background: var(--mint); border-color: var(--mint); }
.option.commit.correct .option-num::before { content: "🎯"; font-size: 12px; }
.option.commit.wrong { border-color: var(--coral); background: var(--coral-bg); color: var(--coral-ink); animation: shake 0.4s; }
.option.commit.wrong .option-num { background: var(--coral); border-color: var(--coral); }
.option.commit.wrong .option-num::before { content: "✕"; color: white; font-size: 12px; }

/* Numeric input */
.numeric-row { display: flex; gap: 10px; align-items: center; }
.numeric-input {
  flex: 1;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 0;
  padding: 14px 16px;
  color: var(--text);
  font-size: 18px;
  font-weight: 900;
  font-family: inherit;
  text-align: center;
}
.numeric-input:focus { outline: none; border-color: var(--mint); }
.numeric-suffix { color: var(--text-2); font-size: 15px; font-weight: 800; }
.check-btn {
  background: var(--mint);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 12px 20px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.check-btn:hover:not(:disabled) { background: var(--mint-2); transform: translateY(-1px); }
.check-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Slider */
.slider-row { display: flex; align-items: center; gap: 14px; }
.slider-label { font-size: 14px; color: var(--text); font-weight: 800; white-space: nowrap; }
.slider-value {
  font-family: "SF Mono", ui-monospace, monospace;
  font-size: 15px;
  color: var(--mint-ink);
  background: var(--mint-bg);
  padding: 6px 12px;
  border-radius: 8px;
  min-width: 90px;
  text-align: center;
  font-weight: 900;
  border: 1px solid var(--mint);
}
input[type="range"] { flex: 1; accent-color: var(--mint); height: 8px; }

/* Predict cards */
.predict-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}
.predict-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 0;
  padding: 14px 10px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 800;
  line-height: 1.3;
  transition: all 0.15s;
  text-align: center;
}
.predict-btn:hover { border-color: var(--mint-2); transform: translateY(-2px); box-shadow: var(--shadow); }
.predict-btn.selected { border-color: var(--orange); background: var(--orange-bg); }
.predict-btn .big { font-size: 24px; display: block; margin-bottom: 4px; }

/* Hypothesis cards */
.hyp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.hyp-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 0;
  padding: 14px 14px;
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 800;
  text-align: left;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.hyp-btn:hover:not(:disabled) { border-color: var(--mint-2); transform: translateY(-2px); box-shadow: var(--shadow); }
.hyp-btn .hyp-icon { font-size: 24px; flex-shrink: 0; }
.hyp-btn.tested-wrong { border-color: var(--coral); background: var(--coral-bg); color: var(--coral-ink); opacity: 0.6; cursor: not-allowed; }
.hyp-btn.tested-right { border-color: var(--mint); background: var(--mint-bg); color: var(--mint-ink); }

/* Hotspot */
.hotspot { cursor: pointer; transition: all 0.2s; }
.hotspot:hover { opacity: 0.75; }
.hotspot.found { stroke: var(--mint); stroke-width: 3; animation: pulse 0.8s; }
@keyframes pulse {
  0%, 100% { stroke-width: 3; }
  50% { stroke-width: 6; }
}

/* Feedback */
.feedback {
  padding: 14px 18px;
  border-radius: 0;
  border-left: 4px solid var(--mint);
  background: var(--mint-bg);
  font-size: 15px;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 16px;
  font-weight: 600;
}
.feedback.hot { border-color: var(--coral); background: var(--coral-bg); }
.feedback.purple { border-color: var(--purple); background: var(--purple-bg); }
.feedback strong { color: var(--text); font-weight: 900; }
.feedback em { color: var(--mint-ink); font-style: normal; font-weight: 900; }

/* Lens reaction bubble (for explore mode) */
.lens-reaction {
  background: var(--purple-bg);
  border: 2px solid var(--purple);
  border-radius: 0;
  padding: 12px 16px;
  margin-top: 12px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  animation: fadeIn 0.3s;
}
.lens-reaction .lens-icon { font-size: 22px; flex-shrink: 0; }
.lens-reaction .lens-text { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.45; }
.lens-reaction .lens-text strong { font-weight: 900; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Tool card */
.tool-card {
  background: linear-gradient(135deg, var(--mint-bg) 0%, var(--yellow-bg) 100%);
  border: 2px solid var(--mint);
  border-radius: 0;
  padding: 26px;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
  animation: toolReveal 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes toolReveal {
  from { transform: scale(0.8) rotate(-4deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}
.tool-card::before {
  content: attr(data-emoji);
  position: absolute;
  top: -20px; right: -10px;
  font-size: 100px;
  opacity: 0.15;
  transform: rotate(15deg);
}
.tool-card .tool-tag { font-size: 11px; letter-spacing: 2px; color: var(--mint-ink); font-weight: 900; margin-bottom: 10px; }
.tool-card h3 { font-size: 26px; color: var(--text); margin-bottom: 10px; font-weight: 900; letter-spacing: -0.5px; }
.tool-card p { font-size: 15px; color: var(--text-2); line-height: 1.5; font-weight: 600; }

/* Toolkit strip */
.toolkit-strip { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.tool-chip {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text-3);
  font-weight: 900;
}
.tool-chip.earned { background: var(--mint-bg); color: var(--mint-ink); border-color: var(--mint); }

/* Nav button */
.nav-row { display: flex; justify-content: space-between; margin-top: 8px; gap: 10px; }
.nav-row.end { justify-content: flex-end; }
.btn {
  background: var(--mint);
  color: white;
  padding: 14px 28px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn:hover:not(:disabled) { background: var(--mint-2); transform: translateY(-2px); box-shadow: var(--shadow-lift); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.btn.secondary { background: var(--bg-2); color: var(--text); }
.btn.coral { background: var(--coral); }
.btn.coral:hover { background: #d84866; }

.hidden { display: none !important; }

/* ══════════════════════════════════════════════════════════
   CASE-FILE HOME PAGE
   ══════════════════════════════════════════════════════════ */
.case-hero {
  background:
    radial-gradient(ellipse 520px 260px at 50% 40%, rgba(255,215,130,0.22) 0%, transparent 72%),
    linear-gradient(165deg, #2B1B10 0%, #1A120B 100%);
  border-radius: 0;
  padding: 34px 28px;
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
  color: #F5E8D3;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
}
.case-hero svg.desk-illo {
  width: 100%;
  max-width: 420px;
  height: auto;
  display: block;
  margin: 0 auto 18px;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
}
.case-hero .tag-line {
  display: inline-block;
  background: var(--coral);
  color: white;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 11px;
  letter-spacing: 1.5px;
  font-weight: 900;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(232,93,117,0.5);
}
.case-hero h1 {
  font-size: 52px;
  font-weight: 900;
  color: #FFFBF0;
  margin-top: 6px;
  margin-bottom: 14px;
  letter-spacing: -2px;
  line-height: 0.95;
  text-align: center;
  text-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.case-hero .hook {
  font-size: 17px;
  color: #D5C4AD;
  font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
  max-width: 540px;
  margin-left: auto;
  margin-right: auto;
}
.case-hero-meta {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 13px;
  color: #F5E8D3;
  font-weight: 800;
}
.case-hero-meta span {
  background: rgba(255,251,240,0.09);
  padding: 7px 14px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  border: 1px solid rgba(255,251,240,0.18);
  backdrop-filter: blur(4px);
}

.postit {
  background: #FFF8C5;
  border: 1px solid #E6D77A;
  border-radius: 4px;
  padding: 18px 22px;
  margin-bottom: 22px;
  box-shadow: 2px 4px 12px rgba(60,45,30,0.08);
  transform: rotate(-0.5deg);
  position: relative;
}
.postit::before {

let audioCtx = null, muted = false;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(f, d = 100, t = 'sine', v = 0.1) {
  if (muted) return;
  initAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = t; o.frequency.value = f;
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d/1000);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + d/1000);
}
const SFX = {
  click: () => tone(600, 40, 'square', 0.05),
  correct: () => { tone(523, 80); setTimeout(() => tone(659, 80), 80); setTimeout(() => tone(784, 140), 160); },
  soft: () => { tone(440, 80, 'sine', 0.06); setTimeout(() => tone(587, 100, 'sine', 0.06), 80); },
  wrong: () => tone(200, 200, 'sawtooth', 0.08),
  tool: () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 120, 'sine', 0.12), i * 90)),
  tick: () => tone(1200, 15, 'square', 0.02)
};
document.getElementById('muteBtn').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';

// CHART RENDERERS
// ═══════════════════════════════════════════════════════════
function renderBars(svgEl, data, yMin, yMax, opts = {}) {
  // viewBox 360×240
  const cT = 24, cB = 200, cL = 36, cR = 348;
  const cH = cB - cT, cW = cR - cL;
  const n = data.length;
  const gap = Math.min(12, cW / (n * 3));
  const barW = Math.max(6, (cW - gap * (n + 1)) / n);
  const unit = opts.unit || 'M';
  const yToPx = v => { const r = yMax - yMin; return r <= 0 ? cB : cB - ((v - yMin) / r) * cH; };
  const step = (yMax - yMin) / 4;
  const decimals = step < 1 ? (step < 0.1 ? 2 : 1) : 0;
  const fmt = v => v.toFixed(decimals);
  let html = '';
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yMax - yMin) * (i / 4);
    const y = yToPx(v);
    html += `<line x1="${cL}" y1="${y}" x2="${cR}" y2="${y}" stroke="#E8DFC8" stroke-width="1" stroke-dasharray="3,4"/>`;
    html += `<text x="${cL - 4}" y="${y + 3}" fill="#5E544D" font-size="11" text-anchor="end" font-family="SF Mono, ui-monospace, monospace" font-weight="800">${fmt(v)}${unit}</text>`;
  }
  html += `<line x1="${cL}" y1="${cT - 6}" x2="${cL}" y2="${cB}" stroke="#C9BE9F" stroke-width="1.5"/>`;
  html += `<line x1="${cL}" y1="${cB}" x2="${cR}" y2="${cB}" stroke="#C9BE9F" stroke-width="1.5"/>`;
  if (opts.title) html += `<text x="${(cL + cR) / 2}" y="14" fill="#99908A" font-size="10" text-anchor="middle" letter-spacing="1.2" font-weight="900">${opts.title}</text>`;
  data.forEach((d, i) => {
    const x = cL + gap + i * (barW + gap);
    const y = yToPx(d.value);
    const h = cB - y;
    const color = opts.barColor || '#2EB39E';
    html += `<rect x="${x}" y="${y}" width="${barW}" height="${h}" fill="${color}" rx="3"/>`;
    if (n <= 6) html += `<text x="${x + barW / 2}" y="${y - 5}" fill="#2B2320" font-size="12" text-anchor="middle" font-weight="900">${d.value}${unit}</text>`;
    const fs = n > 10 ? 10 : 12;
    const rot = n > 10 ? `transform="rotate(-45, ${x + barW / 2}, ${cB + 16})"` : '';
    html += `<text x="${x + barW / 2}" y="${cB + 16}" fill="#5E544D" font-size="${fs}" text-anchor="middle" font-weight="700" ${rot}>${d.month}</text>`;
  });
  svgEl.innerHTML = html;
}

function renderTwoLine(svgEl, data, opts = {}) {
  // viewBox 360×240
  const cT = 36, cB = 200, cL = 36, cR = 348;
  const cH = cB - cT, cW = cR - cL;
  const n = data.length;
  const xStep = cW / (n - 1);
  const max1 = Math.max(...data.map(d => d.iceCream));
  const max2 = Math.max(...data.map(d => d.sharks));
  const max3 = Math.max(...data.map(d => d.beach));
  const y1 = v => cB - (v / (max1 * 1.1)) * cH;
  const y2 = v => cB - (v / (max2 * 1.1)) * cH;
  const y3 = v => cB - (v / (max3 * 1.1)) * cH;
  let html = '';
  for (let i = 0; i <= 4; i++) {
    const y = cT + cH * (i / 4);
    html += `<line x1="${cL}" y1="${y}" x2="${cR}" y2="${y}" stroke="#E8DFC8" stroke-width="1" stroke-dasharray="3,4"/>`;
  }
  html += `<line x1="${cL}" y1="${cT}" x2="${cL}" y2="${cB}" stroke="#C9BE9F" stroke-width="1.5"/>`;
  html += `<line x1="${cL}" y1="${cB}" x2="${cR}" y2="${cB}" stroke="#C9BE9F" stroke-width="1.5"/>`;
  let p1 = data.map((d, i) => `${cL + i * xStep},${y1(d.iceCream)}`).join(' ');
  html += `<polyline points="${p1}" fill="none" stroke="#F99B4E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  data.forEach((d, i) => html += `<circle cx="${cL + i * xStep}" cy="${y1(d.iceCream)}" r="3" fill="#F99B4E" stroke="white" stroke-width="1.5"/>`);
  let p2 = data.map((d, i) => `${cL + i * xStep},${y2(d.sharks)}`).join(' ');
  html += `<polyline points="${p2}" fill="none" stroke="#E85D75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  data.forEach((d, i) => html += `<circle cx="${cL + i * xStep}" cy="${y2(d.sharks)}" r="3" fill="#E85D75" stroke="white" stroke-width="1.5"/>`);
  if (opts.showThird) {
    let p3 = data.map((d, i) => `${cL + i * xStep},${y3(d.beach)}`).join(' ');
    html += `<polyline points="${p3}" fill="none" stroke="#8E6FD8" stroke-width="2.5" stroke-dasharray="5,3" stroke-linecap="round" stroke-linejoin="round"/>`;
    data.forEach((d, i) => html += `<circle cx="${cL + i * xStep}" cy="${y3(d.beach)}" r="3" fill="#8E6FD8" stroke="white" stroke-width="1.5"/>`);
  }
  // x-axis month labels — show every other one if too crowded
  const skipX = n > 8 ? 2 : 1;
  data.forEach((d, i) => {
    if (i % skipX !== 0 && i !== n - 1) return;
    html += `<text x="${cL + i * xStep}" y="${cB + 16}" fill="#5E544D" font-size="11" text-anchor="middle" font-weight="700">${d.month}</text>`;
  });
  // Compact legend — short labels, fits 3 across at viewBox 360

  legend += `<circle cx="${cL + 6}" cy="14" r="4" fill="#F99B4E"/><text x="${cL + 14}" y="18" fill="#5E544D" font-size="11" font-weight="800">🍦 Ice Cream</text>`;

  if (opts.showThird) legend += `<circle cx="${cL + 210}" cy="14" r="4" fill="#8E6FD8"/><text x="${cL + 218}" y="18" fill="#5E544D" font-size="11" font-weight="800">🌞 Beach</text>`;
  html = legend + html;
  svgEl.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// PRIMITIVES
// ═══════════════════════════════════════════════════════════
function progressDots(total, current) {
  let html = '<div class="progress-wrap">';
  for (let i = 0; i < total; i++) {
    const cls = i < current ? 'active' : (i === current ? 'current' : '');
    html += `<div class="progress-dot ${cls}"></div>`;
  }
  return html + '</div>';
}
function bubble(text) {
  return `<div class="mascot-row"><div class="mascot"><svg viewBox="0 0 100 100"><use href="#lens"/></svg></div><div class="bubble"><div class="name">LENS · Detective</div>${text}</div></div>`;
}
function newsBlock(byline, headline, subhead, chartSvgId) {
  return `<div class="news-block"><div class="byline">${byline}</div><div class="headline">${headline}</div><div class="subhead">${subhead}</div><svg class="chart" id="${chartSvgId}" viewBox="0 0 360 240"></svg></div>`;
}
function toolkitStrip() {
  let html = '<div class="toolkit-strip">';
  CHALLENGE.tools.forEach(t => {
    const cls = toolsEarned[t.id] ? 'earned' : '';
    html += `<span class="tool-chip ${cls}">${t.icon} ${t.name}</span>`;
  });
  return html + '</div>';
}
function mcqOpt(letter, text, correct) {
  return `<button class="option" data-correct="${correct}"><span class="option-num">${letter}</span>${text}</button>`;
}
function multiOpt(text, correct) {
  return `<button class="option multi" data-correct="${correct}"><span class="option-num"></span>${text}</button>`;
}
function exploreOpt(text, reaction, isKey = false) {
  return `<button class="option explore" data-key="${isKey}" data-react="${reaction.replace(/"/g, '&quot;')}"><span class="option-num"></span>${text}</button>`;
}
function commitOpt(text, isKey) {
  return `<button class="option commit" data-key="${isKey}"><span class="option-num"></span>${text}</button>`;
}

// ═══════════════════════════════════════════════════════════
// INTERACTION HELPERS
// ═══════════════════════════════════════════════════════════
function setupMCQ(mcqId, fbId, nextId, onCorrect) {
  const mcq = document.getElementById(mcqId);
  if (!mcq) return;
  mcq.querySelectorAll(".option").forEach(btn => {
    btn.addEventListener("click", () => {
      const correct = btn.dataset.correct === "true";
      if (correct) {
        SFX.correct();
        mcq.querySelectorAll(".option").forEach(o => o.disabled = true);
        btn.classList.add("correct");
        if (fbId) document.getElementById(fbId).classList.remove("hidden");
        if (nextId) document.getElementById(nextId).disabled = false;
        if (onCorrect) onCorrect();
      } else {
        SFX.wrong();
        btn.classList.add("wrong");
        setTimeout(() => btn.classList.remove("wrong"), 800);
      }
    });
  });
}

// Multi-correct: pick N correct ones, submit via check button
function setupMultiMCQ(mcqId, checkBtnId, fbId, nextId) {
  const mcq = document.getElementById(mcqId);
  if (!mcq) return;
  const checkBtn = document.getElementById(checkBtnId);
  const fb = document.getElementById(fbId);
  const nxt = document.getElementById(nextId);

  mcq.querySelectorAll(".option.multi").forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.disabled) return;
      btn.classList.toggle("selected");
      SFX.click();
      const anySelected = mcq.querySelectorAll(".option.multi.selected").length > 0;
      checkBtn.disabled = !anySelected;
    });
  });

  checkBtn.addEventListener("click", () => {
    let allCorrect = true;
    mcq.querySelectorAll(".option.multi").forEach(btn => {
      const shouldBeSelected = btn.dataset.correct === "true";
      const isSelected = btn.classList.contains("selected");
      btn.classList.remove("selected");
      btn.disabled = true;
      if (shouldBeSelected && isSelected) btn.classList.add("correct");
      else if (!shouldBeSelected && isSelected) { btn.classList.add("wrong"); allCorrect = false; }
      else if (shouldBeSelected && !isSelected) { btn.classList.add("missed"); allCorrect = false; }
    });
    checkBtn.disabled = true;
    if (allCorrect) { SFX.correct(); } else { SFX.soft(); }
    if (fb) fb.classList.remove("hidden");
    if (nxt) nxt.disabled = false;
  });
}

// Phase 1 — Exploration. Kid taps options to hear Lens's take on each.
// All taps look the same (purple "seen") — no right/wrong signal here.
// After `tapsNeeded` taps, reveal the Phase 2 commit panel.
function setupExplore(mcqId, reactionId, phase2Id, tapsNeeded = 2) {
  const mcq = document.getElementById(mcqId);
  if (!mcq) return;
  const reaction = document.getElementById(reactionId);
  const phase2 = phase2Id ? document.getElementById(phase2Id) : null;
  let taps = 0;
  mcq.querySelectorAll(".option.explore").forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.classList.contains("seen")) return;
      btn.classList.add("seen");
      SFX.soft();
      const text = btn.dataset.react;
      reaction.innerHTML = `<div class="lens-icon">🔍</div><div class="lens-text"><strong>Lens:</strong> ${text}</div>`;
      reaction.classList.remove("hidden");
      taps++;
      if (taps >= tapsNeeded && phase2 && phase2.classList.contains("hidden")) {
        phase2.classList.remove("hidden");
        setTimeout(() => phase2.scrollIntoView({ behavior: "smooth", block: "center" }), 300);
      }
    });
  });
}

// Phase 2 — Commit. Kid must deliberately pick one observation to follow up on.
// Wrong picks get a gentle nudge; unlimited retries. Continue enables only on correct.
function setupCommit(commitId, commitBtnId, fbId, nextId) {
  const commit = document.getElementById(commitId);
  if (!commit) return;
  const commitBtn = document.getElementById(commitBtnId);
  const fb = document.getElementById(fbId);
  const nxt = document.getElementById(nextId);
  let done = false;

  commit.querySelectorAll(".option.commit").forEach(btn => {
    btn.addEventListener("click", () => {
      if (done) return;
      commit.querySelectorAll(".option.commit").forEach(o => {
        o.classList.remove("selected");
        o.classList.remove("wrong");
      });
      btn.classList.add("selected");
      commitBtn.disabled = false;
      if (fb) fb.classList.add("hidden");
      SFX.click();
    });
  });

  commitBtn.addEventListener("click", () => {
    if (done) return;
    const selected = commit.querySelector(".option.commit.selected");
    if (!selected) return;
    const isKey = selected.dataset.key === "true";
    if (isKey) {
      SFX.correct();
      done = true;
      selected.classList.remove("selected");
      selected.classList.add("correct");
      commit.querySelectorAll(".option.commit").forEach(o => o.disabled = true);
      commitBtn.disabled = true;
      commitBtn.textContent = "Got it ✓";
      if (fb) {
        fb.classList.remove("hidden");
        fb.className = "feedback";
        fb.innerHTML = `<strong>🎯 Good lead.</strong> Let's follow it.`;
      }
      if (nxt) nxt.disabled = false;
    } else {
      SFX.wrong();
      selected.classList.remove("selected");
      selected.classList.add("wrong");
      commitBtn.disabled = true;
      if (fb) {
        fb.classList.remove("hidden");
        fb.className = "feedback hot";
        fb.innerHTML = `That's a real observation — but Lens thinks the strongest clue is somewhere else. Look again.`;
      }
    }
  });
}

  }
  if (sub === 1) {

    const nextBtn = document.getElementById("next-c3-gut");
    let answered = false;
    gut.querySelectorAll(".option.gut").forEach(btn => {
      btn.addEventListener("click", () => {
        if (answered) return;
        answered = true;
        btn.classList.add("selected");
        reaction.innerHTML = `<div class="lens-icon">🔍</div><div class="lens-text"><strong>Lens:</strong> ${btn.dataset.reaction}</div>`;
        reaction.classList.remove("hidden");
        SFX.soft();
        nextBtn.disabled = false;
      });
    });
  }
  if (sub === 2) {
    renderTwoLine(document.getElementById("chart3-first"), DATA.iceCream);
    setupExplore("mcq-c3-first", "reaction-c3-first", "phase2-c3-first", 4);
    setupCommit("commit-c3-first", "commit-btn-c3-first", "commit-fb-c3-first", "next-c3-first");
  }
  if (sub === 3) {
    renderTwoLine(document.getElementById("chart3-msg"), DATA.iceCream);
    setupMCQ("mcq-c3-msg", "fb-c3-msg", "next-c3-msg");
  }
  if (sub === 4) setupMultiMCQ("mcq-c3-facts", "check-c3-facts", "fb-c3-facts", "next-c3-facts");
  if (sub === 5) setupMCQ("mcq-c3-logic", "fb-c3-logic", "next-c3-logic");
  if (sub === 6) {
    renderTwoLine(document.getElementById("chart3-hyp"), DATA.iceCream);
    const fb = document.getElementById("fb-c3-hyp");
    const nxt = document.getElementById("next-c3-hyp");
    document.querySelectorAll(".hyp-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const hyp = btn.dataset.hyp;
        if (hyp === "summer") {
          SFX.correct();
          btn.classList.add("tested-right");
          document.querySelectorAll(".hyp-btn").forEach(b => b.disabled = true);
          renderTwoLine(document.getElementById("chart3-hyp"), DATA.iceCream, { showThird: true });
          fb.classList.remove("hidden");
          nxt.disabled = false;
        } else {
          SFX.wrong();
          btn.classList.add("tested-wrong");
          btn.disabled = true;
        }
      });
    });
  }
  if (sub === 7) setupMCQ("mcq-c3-apply", "fb-c3-apply", "next-c3-apply");
  if (sub === 8) {
    setupMCQ("mcq-c3-name", "fb-c3-name", "next-c3-name", () => {
      toolsEarned.third = true;
      document.getElementById("tool-third").classList.remove("hidden");
      SFX.tool();
      setTimeout(() => document.getElementById("fb-c3-name").innerHTML = `Your toolkit so far:${toolkitStrip()}`, 100);
    });
  }
}

  if (sub === 2) {
    const slider = document.getElementById("fn-axis");
    const display = document.getElementById("fn-axis-display");
    const fb = document.getElementById("fn-fb");
    const byline = document.getElementById("fn-byline");
    const headline = document.getElementById("fn-headline");
    const subhead = document.getElementById("fn-subhead");
    const nxt = document.getElementById("next-fn-fix");
    let lastTick = 6.0;
    const render = () => {
      const y = parseFloat(slider.value);
      display.textContent = y.toFixed(1) + " hrs";
      renderBars(document.getElementById("fn-fix-chart"), DATA.screen, y, 6.5, {
        title: "AVG HOURS/DAY · PHONES & TABLETS", unit: " hrs", barColor: y === 0 ? "#2EB39E" : "#E85D75"
      });
      if (Math.abs(y - lastTick) >= 0.3) { SFX.tick(); lastTick = y; }
      if (y >= 5.5) {
        fb.className = "feedback hot";
        fb.innerHTML = `Dishonest scale. This year's bar still looks like a mountain. Keep going…`;
        byline.textContent = "PARENTING TIMES · DISHONEST VERSION";
        headline.innerHTML = `TEEN SCREEN TIME <span class="hot">SKYROCKETS!</span>`;
        subhead.textContent = "New study shocks parents.";
      } else if (y > 0) {
        fb.className = "feedback hot";
        fb.innerHTML = `Better — but pull all the way to 0 for the truth.`;
      } else {
        fb.className = "feedback";
        fb.innerHTML = `<strong>Honest scale.</strong> Both bars almost the same height. Real change: <em>0.3 hours/day</em>. About a 5% bump, not a skyrocket.`;
        byline.textContent = "PARENTING TIMES · HONEST VERSION";
        headline.innerHTML = `Teen screen time up slightly.`;
        subhead.textContent = "6.1 → 6.4 hours/day. About 5% more.";
        nxt.disabled = false;
      }
    };
    slider.addEventListener("input", render);
    render();
  }
  if (sub === 3) {
    renderBars(document.getElementById("fn-rewrite-chart"), DATA.screen, 0, 6.5, {
      title: "AVG HOURS/DAY · PHONES & TABLETS", unit: " hrs", barColor: "#2EB39E"
    });
    setupMCQ("mcq-fn-rewrite", "fb-fn-rewrite", "next-fn-rewrite");
  }
}

// ═══════════════════════════════════════════════════════════

  return `
    <div class="frame">
      <div class="complete-hero">
        <div class="tag">CASE CLOSED</div>
        <h1>You caught the liars.</h1>
        <div class="complete-summary">Every chart had correct numbers. The lies lived in the framing. You've built a toolkit you can use on every chart you see — TV, Instagram, anywhere.</div>
      </div>
      ${bubble(`Great work, partner. You earned the tools the hard way. Next time someone shows you a chart, you'll see right through it.`)}
      <div class="evidence-title">🛠 Your BS Detector Toolkit</div>
      <div class="tool-preview-grid">
        ${CHALLENGE.tools.map(t => `
          <div class="tool-preview" style="opacity:${toolsEarned[t.id] ? 1 : 0.35}; border-style:${toolsEarned[t.id] ? 'solid' : 'dashed'}; border-color:${toolsEarned[t.id] ? 'var(--mint)' : 'var(--border-strong)'}; background:${toolsEarned[t.id] ? 'var(--mint-bg)' : 'var(--card)'};">
            <div class="emoji">${t.icon}</div>
            <div class="name" style="color:${toolsEarned[t.id] ? 'var(--mint-ink)' : 'var(--text-3)'};">The ${t.name}</div>
          </div>
        `).join('')}
      </div>
      <div class="share-card">
        <div class="preview-card">
          <h4>I caught 4 lies before they hit the front page.</h4>
          <p>Can you? → Fake Chart Detective, a Real Math League case.</p>
          <div class="brand">🔍 RML · cuemath.com/league</div>
        </div>
        <button class="btn">Share the case</button>
      </div>
      <div class="nav-row">
        <button class="btn secondary" onclick="location.reload()">↻ Try again</button>
        <button class="btn">Next case →</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
function renderChart(idx) {
  const s = CHALLENGE.sections[idx];
  if (s.id === "chart-1") return renderChart1(currentSubStep);
  if (s.id === "chart-2") return renderChart2(currentSubStep);
  if (s.id === "chart-3") return renderChart3(currentSubStep);
}
function mountChart(idx) {
  const s = CHALLENGE.sections[idx];
  if (s.id === "chart-1") mountChart1(currentSubStep);
  if (s.id === "chart-2") mountChart2(currentSubStep);
  if (s.id === "chart-3") mountChart3(currentSubStep);
}

function render() {
  const s = CHALLENGE.sections[currentSection];
  const main = document.getElementById("main");
  let html = '';
  if (s.kind === "intro") html = renderIntro();
  else if (s.kind === "chart") html = renderChart(currentSection);
  else if (s.kind === "placeholder") html = renderPlaceholder(currentSection);
  else if (s.kind === "finale") html = renderFinale(currentSubStep);
  else if (s.kind === "completion") html = renderCompletion();
  main.innerHTML = html;

  if (s.kind === "chart") mountChart(currentSection);
  if (s.kind === "finale") mountFinale(currentSubStep);

  renderSidebar();
  updateStepIndicator();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function gotoSection(idx) {
  if (idx < 0 || idx >= CHALLENGE.sections.length) return;
  SFX.click();
  currentSection = idx;
  currentSubStep = 0;
  syncScreenURL();
  render();
}

function syncScreenURL() {
  try {
    const url = new URL(window.location.href);
    url.searchParams.set('screen', currentSection + 1);
    window.history.replaceState({}, '', url.toString());
  } catch (e) {}
}

function getScreenFromURL() {
  const raw = new URLSearchParams(window.location.search).get('screen');
  if (raw === null) return null;
  const s = parseInt(raw, 10);
  if (Number.isNaN(s) || s < 1 || s > CHALLENGE.sections.length) return null;
  return s - 1;
}

// Only mark complete when user earns it (not just by jumping nav)
function markAndGoto(markIdx, goIdx) {
  completedSections.add(markIdx);
  gotoSection(goIdx);
}

function nextSub() {
  SFX.click();
  currentSubStep += 1;
  render();
}

// INIT — honor ?screen=N
const _urlScreen = getScreenFromURL();
if (_urlScreen !== null) currentSection = _urlScreen;
syncScreenURL();
render();
</script>
