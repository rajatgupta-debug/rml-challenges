<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Feed Is a Choice — RML</title>
<style>
/* ══════════════════════════════════════════════════════════
   DESIGN SYSTEM
   ══════════════════════════════════════════════════════════ */
:root {
  --bg: #FBF5E8;
  --bg-2: #F5EDD8;
  --card: #FFFFFF;
  --border: #E8DFC8;
  --border-strong: #C9BE9F;
  --shadow: 0 6px 24px rgba(60, 45, 30, 0.08);
  --shadow-lift: 0 12px 40px rgba(60, 45, 30, 0.14);

  --text: #2B2320;
  --text-2: #5E544D;
  --text-3: #99908A;

  --mint: #2EB39E;
  --mint-2: #5FC9B5;
  --mint-bg: #DFF5EF;
  --mint-ink: #1A6A5C;

  --coral: #E85D75;
  --coral-bg: #FDE7EB;
  --coral-ink: #B72F47;

  --orange: #F99B4E;
  --orange-bg: #FDECDB;

  --yellow: #F4C430;
  --yellow-bg: #FDF3CA;

  --purple: #8E6FD8;
  --purple-bg: #EFE8FC;

  --pink: #F472B6;
  --pink-bg: #FDE7F1;

  --navy: #2B3861;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Nunito", "SF Pro Rounded", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-weight: 600;
  line-height: 1.4;
}

/* TOPBAR */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 900;
  font-size: 17px;
  color: var(--text);
}
.topbar-brand .logo {
  background: var(--coral);
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
}
.topbar-meta { font-size: 13px; color: var(--text-3); font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.mute-btn {
  background: var(--bg-2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.15s;
}
.mute-btn:hover { transform: scale(1.08); background: var(--yellow-bg); }

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  max-width: 1200px;
  margin: 0 auto;
  min-height: calc(100vh - 60px);
}
.sidebar {
  padding: 28px 16px 40px;
  border-right: 1px solid var(--border);
  background: var(--bg);
}
.sidebar h4 {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-3);
  margin: 0 12px 10px;
  font-weight: 900;
  text-transform: uppercase;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-2);
  transition: all 0.15s;
  margin-bottom: 3px;
  border: 2px solid transparent;
}
.nav-item:hover { background: var(--bg-2); color: var(--text); }
.nav-item.current {
  background: var(--coral-bg);
  color: var(--coral-ink);
  border-color: var(--coral);
}
.nav-item.done { color: var(--text); }
.nav-num {
  background: var(--border);
  color: var(--text-2);
  width: 26px; height: 26px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 900;
  flex-shrink: 0;
}
.nav-item.current .nav-num { background: var(--coral); color: white; }
.nav-item.done .nav-num { background: var(--mint-bg); color: var(--mint-ink); }
.nav-item.done .nav-num::before { content: "✓"; }
.nav-item.done .nav-num-text { display: none; }

.main { padding: 32px 40px 60px; min-width: 0; }
.frame {
  background: var(--card);
  border-radius: 20px;
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  max-width: 760px;
  margin: 0 auto;
}

.progress-wrap { display: flex; gap: 5px; margin-bottom: 22px; }
.progress-dot {
  flex: 1; height: 6px;
  background: var(--border);
  border-radius: 3px;
  transition: background 0.4s;
}
.progress-dot.active { background: var(--coral); }
.progress-dot.current { background: var(--orange); }

.step-label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--coral-ink);
  margin-bottom: 6px;
}
.step-title {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 18px;
  line-height: 1.25;
  letter-spacing: -0.3px;
}

/* MASCOT BUBBLE — Pix */
.mascot-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  margin-bottom: 18px;
}
.mascot {
  flex-shrink: 0;
  width: 64px; height: 64px;
  animation: pixIdle 2.4s ease-in-out infinite;
}
.mascot svg { width: 100%; height: 100%; }
@keyframes pixIdle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}
.bubble {
  flex: 1;
  background: var(--coral-bg);
  border: 2px solid var(--coral);
  border-radius: 18px;
  padding: 14px 18px;
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.5;
  position: relative;
}
.bubble::before {
  content: "";
  position: absolute;
  left: -10px; top: 18px;
  width: 0; height: 0;
  border: 10px solid transparent;
  border-right-color: var(--coral);
  border-left: 0;
}
.bubble::after {
  content: "";
  position: absolute;
  left: -7px; top: 20px;
  width: 0; height: 0;
  border: 8px solid transparent;
  border-right-color: var(--coral-bg);
  border-left: 0;
}
.bubble .name {
  color: var(--coral-ink);
  font-weight: 900;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.bubble.tiny { padding: 10px 14px; font-size: 14px; }

/* PHONE — VidTok feed container */
.phone-wrap {
  display: flex;
  justify-content: center;
  margin: 4px 0 18px;
}
.phone {
  width: 100%;
  max-width: 360px;
  background: #1A120B;
  border-radius: 30px;
  padding: 14px 12px 16px;
  box-shadow: 0 16px 50px rgba(60,45,30,0.22), inset 0 0 0 2px rgba(255,255,255,0.04);
  position: relative;
}
.phone-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #F5E8D3;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 1px;
  padding: 4px 8px 12px;
}
.phone-header .app-name {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
}
.phone-header .app-name .logo-mark {
  background: var(--coral);
  color: white;
  border-radius: 6px;
  width: 22px; height: 22px;
  display: inline-flex;
  align-items: center; justify-content: center;
  font-size: 12px;
}
.phone-header .who { font-size: 10px; opacity: 0.6; letter-spacing: 1.5px; }
.feed {
  background: #FFFBF0;
  border-radius: 20px;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* VIDEO CARD */
.vcard {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 10px;
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 10px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  text-align: left;
  font-family: inherit;
  width: 100%;
  animation: vcardIn 0.32s ease-out;
}
@keyframes vcardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.vcard:hover:not(:disabled) { border-color: var(--coral); transform: translateY(-1px); box-shadow: var(--shadow); }
.vcard.tapped { border-color: var(--coral); background: var(--coral-bg); }
.vcard.tapped::after {
  content: "❤";
  position: absolute;
  right: 10px; top: 8px;
  color: var(--coral);
  font-size: 18px;
  animation: heartPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes heartPop {
  0% { transform: scale(0.4); opacity: 0; }
  60% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
.vcard:disabled { cursor: default; opacity: 0.65; }

.vthumb {
  width: 64px; height: 64px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
}
.vthumb.t-sports { background: linear-gradient(135deg,#F99B4E,#E85D75); }
.vthumb.t-cooking { background: linear-gradient(135deg,#F4C430,#F99B4E); }
.vthumb.t-animals { background: linear-gradient(135deg,#5FC9B5,#2EB39E); }
.vthumb.t-gaming { background: linear-gradient(135deg,#8E6FD8,#2B3861); }
.vthumb.t-dance { background: linear-gradient(135deg,#F472B6,#8E6FD8); }
.vthumb.t-music { background: linear-gradient(135deg,#5FC9B5,#8E6FD8); }
.vthumb.t-comedy { background: linear-gradient(135deg,#F4C430,#E85D75); }
.vthumb.t-challenge { background: linear-gradient(135deg,#E85D75,#F99B4E); }
.vthumb.t-sad { background: linear-gradient(135deg,#3D2B5C,#1A1226); color: rgba(255,255,255,0.85); }

.vmeta { min-width: 0; display: flex; flex-direction: column; gap: 3px; padding-right: 22px; }
.vmeta .vtitle {
  font-size: 14px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.2;
  margin: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.vmeta .vcreator { font-size: 12px; color: var(--text-2); font-weight: 700; }
.vmeta .vbottom {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 11px;
  color: var(--text-3);
  font-weight: 800;
  margin-top: 2px;
}
.vmeta .vtag {
  background: var(--bg-2);
  color: var(--text-2);
  padding: 2px 7px;
  border-radius: 6px;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-transform: lowercase;
}

/* TALLY PANEL */
.tally {
  background: var(--bg-2);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 14px 16px;
  margin-top: 12px;
  margin-bottom: 12px;
  font-size: 13px;
  font-weight: 800;
  color: var(--text);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.tally .row {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.tally .row .label {
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 900;
}
.tally .row .val {
  font-size: 18px;
  font-weight: 900;
  color: var(--coral-ink);
  font-family: "SF Mono", ui-monospace, monospace;
}

/* TOPIC SHIFT BUTTONS */
.topic-shift {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
  margin-bottom: 12px;
}
.tshift-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 12px 10px;
  font-size: 13px;
  color: var(--text);
  font-weight: 800;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  text-align: center;
}
.tshift-btn:hover { border-color: var(--coral); transform: translateY(-1px); }
.tshift-btn.active { background: var(--coral-bg); border-color: var(--coral); color: var(--coral-ink); }
.tshift-btn .big { display: block; font-size: 20px; margin-bottom: 4px; }

/* DIAL */
.dial-wrap {
  background: var(--bg-2);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 14px 18px;
  margin-top: 6px;
  margin-bottom: 14px;
}
.dial-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.dial-end {
  font-size: 12px;
  font-weight: 900;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: center;
  flex-shrink: 0;
  width: 86px;
}
.dial-end .arrow { font-size: 16px; display: block; margin-bottom: 2px; }
input[type="range"].dial { flex: 1; accent-color: var(--coral); height: 8px; }
.dial-readout {
  text-align: center;
  font-size: 13px;
  font-weight: 800;
  color: var(--text-2);
  font-family: "SF Mono", ui-monospace, monospace;
}

/* SCORE BARS (Step 4) */
.score-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 6px;
  margin-bottom: 14px;
}
.score-item {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 50px 1fr 70px;
  gap: 12px;
  align-items: center;
  position: relative;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.score-item.top { border-color: var(--mint); background: var(--mint-bg); box-shadow: var(--shadow); }
.score-item .rank-bubble {
  background: var(--bg-2);
  color: var(--text-2);
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 16px;
  font-family: "SF Mono", ui-monospace, monospace;
}
.score-item.top .rank-bubble { background: var(--mint); color: white; }
.score-item .si-meta { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.score-item .si-title { font-size: 14px; font-weight: 900; color: var(--text); line-height: 1.2; }
.score-item .si-bars { display: flex; flex-direction: column; gap: 4px; }
.score-item .si-bar {
  display: grid;
  grid-template-columns: 86px 1fr 36px;
  gap: 6px;
  align-items: center;
  font-size: 11px;
  font-weight: 800;
  color: var(--text-2);
}
.bar-track {
  height: 8px;
  background: var(--bg-2);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: var(--orange);
  border-radius: 4px;
  transition: width 0.3s;
}
.bar-fill.alt { background: var(--purple); }
.score-item .si-num {
  font-family: "SF Mono", ui-monospace, monospace;
  font-size: 11px;
  font-weight: 900;
  color: var(--text-2);
  text-align: right;
}
.score-item .si-final {
  background: var(--bg-2);
  border-radius: 12px;
  padding: 8px 6px;
  text-align: center;
}
.score-item.top .si-final { background: var(--mint); color: white; }
.score-item .si-final .lbl { font-size: 9px; letter-spacing: 1.5px; font-weight: 900; opacity: 0.8; }
.score-item .si-final .val {
  font-size: 18px;
  font-weight: 900;
  font-family: "SF Mono", ui-monospace, monospace;
  letter-spacing: -0.5px;
}

.formula-box {
  background: var(--purple-bg);
  border: 2px solid var(--purple);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 14px;
  font-family: "SF Mono", ui-monospace, monospace;
  font-size: 14px;
  color: var(--text);
  font-weight: 800;
  text-align: center;
  letter-spacing: -0.3px;
}
.formula-box .var { color: var(--coral-ink); }

.task-list { margin-top: 4px; margin-bottom: 12px; }
.task-row {
  background: var(--bg-2);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 11px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  transition: all 0.2s;
}
.task-row.done {
  border-color: var(--mint);
  background: var(--mint-bg);
  color: var(--mint-ink);
}
.task-row .ck {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border-strong);
  background: white;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 900;
  color: transparent;
}
.task-row.done .ck {
  border-color: var(--mint);
  background: var(--mint);
  color: white;
}
.task-row.done .ck::before { content: "✓"; }

/* STEP 6 — side by side feeds */
.dual {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 8px 0 18px;
}
.dual .phone { max-width: none; padding: 10px 8px 12px; }
.dual .feed { padding: 8px; gap: 7px; }
.dual .vcard { padding: 7px; grid-template-columns: 44px 1fr; gap: 7px; }
.dual .vthumb { width: 44px; height: 44px; font-size: 22px; border-radius: 8px; }
.dual .vmeta .vtitle { font-size: 11px; -webkit-line-clamp: 2; }
.dual .vmeta .vcreator { font-size: 10px; }
.dual .vmeta .vbottom { display: none; }
.dual .vmeta { padding-right: 4px; }
.dual-label {
  text-align: center;
  font-size: 11px;
  letter-spacing: 1.5px;
  font-weight: 900;
  color: var(--text-3);
  margin-bottom: 6px;
  text-transform: uppercase;
}
@media (max-width: 600px) {
  .dual { grid-template-columns: 1fr; }
}

/* QUESTIONS + OPTIONS — reused */
.question {
  background: var(--yellow-bg);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
  margin-bottom: 14px;
}
.q-label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1.5px;
  color: var(--orange);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.q-text {
  font-size: 17px;
  color: var(--text);
  font-weight: 800;
  margin-bottom: 14px;
  line-height: 1.35;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  color: var(--text);
  font-size: 15px;
  font-weight: 700;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  line-height: 1.4;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.option-num {
  background: var(--bg-2);
  color: var(--text-2);
  width: 26px; height: 26px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 900;
  flex-shrink: 0;
}
.option:hover:not(:disabled) { border-color: var(--coral); transform: translateY(-1px); box-shadow: var(--shadow); }
.option.selected { border-color: var(--coral); background: var(--coral-bg); }
.option.correct { border-color: var(--mint); background: var(--mint-bg); color: var(--mint-ink); }
.option.correct .option-num { background: var(--mint); color: white; }
.option.wrong { border-color: var(--coral); background: var(--coral-bg); color: var(--coral-ink); animation: shake 0.4s; }
.option.missed { border-color: var(--yellow); background: var(--yellow-bg); }
.option.missed::after { content: " (missed)"; color: var(--text-3); font-size: 12px; margin-left: auto; }
.option:disabled { cursor: default; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

.option.multi .option-num {
  border-radius: 6px;
  background: white;
  border: 2px solid var(--border-strong);
  color: transparent;
  font-size: 16px;
}
.option.multi.selected .option-num {
  background: var(--coral);
  border-color: var(--coral);
  color: white;
}
.option.multi.selected .option-num::before { content: "✓"; }
.option.multi.correct .option-num { background: var(--mint); border-color: var(--mint); color: white; }
.option.multi.correct .option-num::before { content: "✓"; }
.option.multi.wrong .option-num { background: var(--coral); border-color: var(--coral); color: white; }
.option.multi.wrong .option-num::before { content: "✕"; }

.check-btn {
  background: var(--coral);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

let audioCtx = null, muted = false;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(f, d = 100, t = 'sine', v = 0.1) {
  if (muted) return;
  initAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = t; o.frequency.value = f;
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d/1000);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + d/1000);
}
const SFX = {
  click: () => tone(600, 40, 'square', 0.05),
  tap:   () => { tone(880, 50, 'triangle', 0.06); setTimeout(() => tone(1175, 60, 'triangle', 0.05), 40); },
  correct: () => { tone(523, 80); setTimeout(() => tone(659, 80), 80); setTimeout(() => tone(784, 140), 160); },
  soft: () => { tone(440, 80, 'sine', 0.06); setTimeout(() => tone(587, 100, 'sine', 0.06), 80); },
  wrong: () => tone(200, 200, 'sawtooth', 0.08),
  tool: () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 120, 'sine', 0.12), i * 90)),
  tick: () => tone(1200, 15, 'square', 0.02),
  reload: () => { tone(330, 80, 'triangle', 0.05); setTimeout(() => tone(440, 100, 'triangle', 0.05), 80); }
};

// ═══════════════════════════════════════════════════════════
// SCORING ENGINE — the actual algorithm running everywhere
// score = w_topic * topicMatch + w_watchtime * watchtime
//       + w_recent * freshness + w_friends * friend
// ═══════════════════════════════════════════════════════════
function scoreVideo(v, weights, topicLikes) {
  const topicMatch = topicLikes && topicLikes[v.topic] ? Math.min(topicLikes[v.topic] / 3, 1) : 0;
  return (weights.topic    || 0) * topicMatch
       + (weights.watchtime|| 0) * v.watchtime
       + (weights.recent   || 0) * v.freshness
       + (weights.friends  || 0) * v.friend;
}
function rankFeed(pool, weights, topicLikes, n = 6) {
  return [...pool]
    .map(v => ({ v, s: scoreVideo(v, weights, topicLikes) }))
    .sort((a, b) => b.s - a.s)
    .slice(0, n)
    .map(x => x.v);
}

// State
const STATE = {
  taps: {},      // videoId -> 1
  topicLikes: {} // topic -> count
};
function tapVideo(v) {
  STATE.taps[v.id] = (STATE.taps[v.id] || 0) + 1;
  STATE.topicLikes[v.topic] = (STATE.topicLikes[v.topic] || 0) + 1;
}

  let html = '<div class="progress-wrap">';
  for (let i = 0; i < total; i++) {
    const cls = i < current ? 'active' : (i === current ? 'current' : '');
    html += `<div class="progress-dot ${cls}"></div>`;
  }
  return html + '</div>';
}

// INTERACTION HELPERS
// ═══════════════════════════════════════════════════════════
function setupMCQ(mcqId, fbId, nextId, onCorrect) {
  const mcq = document.getElementById(mcqId);
  if (!mcq) return;
  mcq.querySelectorAll(".option").forEach(btn => {
    btn.addEventListener("click", () => {
      const correct = btn.dataset.correct === "true";
      if (correct) {
        SFX.correct();
        mcq.querySelectorAll(".option").forEach(o => o.disabled = true);
        btn.classList.add("correct");
        if (fbId) document.getElementById(fbId).classList.remove("hidden");
        if (nextId) document.getElementById(nextId).disabled = false;
        if (onCorrect) onCorrect();
      } else {
        SFX.wrong();
        btn.classList.add("wrong");
        setTimeout(() => btn.classList.remove("wrong"), 800);
      }
    });
  });
}

function setupMultiMCQ(mcqId, checkBtnId, fbId, nextId) {
  const mcq = document.getElementById(mcqId);
  if (!mcq) return;
  const checkBtn = document.getElementById(checkBtnId);
  const fb = document.getElementById(fbId);
  const nxt = document.getElementById(nextId);

  mcq.querySelectorAll(".option.multi").forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.disabled) return;
      btn.classList.toggle("selected");
      SFX.click();
      const anySelected = mcq.querySelectorAll(".option.multi.selected").length > 0;
      checkBtn.disabled = !anySelected;
    });
  });

  checkBtn.addEventListener("click", () => {
    let allCorrect = true;
    mcq.querySelectorAll(".option.multi").forEach(btn => {
      const shouldBeSelected = btn.dataset.correct === "true";
      const isSelected = btn.classList.contains("selected");
      btn.classList.remove("selected");
      btn.disabled = true;
      if (shouldBeSelected && isSelected) btn.classList.add("correct");
      else if (!shouldBeSelected && isSelected) { btn.classList.add("wrong"); allCorrect = false; }
      else if (shouldBeSelected && !isSelected) { btn.classList.add("missed"); allCorrect = false; }
    });
    checkBtn.disabled = true;
    if (allCorrect) { SFX.correct(); } else { SFX.soft(); }
    if (fb) fb.classList.remove("hidden");
    if (nxt) nxt.disabled = false;
  });
}

        if (videos.length < 6) {
          const more = pool.filter(v => !videos.includes(v));
          videos = videos.concat(more.slice(0, 6 - videos.length));

      } else {

        const fakeTopicLikes = { [topic]: 5 };

// STEP 4 — Open the Hood (real weighted-average math)
// 4 cards. Slider shifts weight between watchtime & likes.
// ═══════════════════════════════════════════════════════════
const STEP4_CARDS = [
  { id: "A", title: "skater fail compilation", emoji: "🛹", topic: "sports", watchtime: 0.80, likes: 0.30 },
  { id: "B", title: "MrBeast gives away $1M", emoji: "💸", topic: "challenge", watchtime: 0.30, likes: 0.90 },

];

function renderStep4() {
  return `
    <div class="frame">${progressDots(8, 3)}

      <div class="step-title">Each video gets a score. Highest score wins. Here's the actual formula.</div>

      <div class="formula-box" id="s4-formula">
        score = <span class="var" id="s4-w-watch">0.50</span> × watch&nbsp;time + <span class="var" id="s4-w-likes">0.50</span> × likes
      </div>

      <div class="dial-wrap">
        <div class="dial-row">
          <div class="dial-end"><span class="arrow">←</span>LIKES MATTER MORE</div>
          <input type="range" class="dial" id="s4-dial" min="0" max="100" value="50">
          <div class="dial-end">WATCH TIME MATTERS MORE<span class="arrow">→</span></div>
        </div>
      </div>

      <div class="score-list" id="s4-scores"></div>

      <div class="task-list">
        <div class="task-row" id="s4-task1"><div class="ck"></div><div>Make <strong>🛹 skater fail</strong> the #1 video.</div></div>
        <div class="task-row" id="s4-task2"><div class="ck"></div><div>Make <strong>💸 MrBeast</strong> the #1 video.</div></div>
        <div class="task-row" id="s4-task3"><div class="ck"></div><div>Find the slider position where <strong>🛹 skater</strong> and <strong>🧀 grilled cheese</strong> are <em>tied</em> at the top.</div></div>
      </div>

      <div id="s4-after" class="hidden">
        ${tinyBubble(`That's the whole engine. Multiplication. Addition. Sort. The hard part is <strong>who picks the weights</strong>.`)}
        <div class="nav-row end"><button class="btn" onclick="markAndGoto(4, 5)">Meet Maya →</button></div>
      </div>
    </div>`;
}

function mountStep4() {
  const dial = document.getElementById("s4-dial");
  const wWatch = document.getElementById("s4-w-watch");
  const wLikes = document.getElementById("s4-w-likes");
  const scoresEl = document.getElementById("s4-scores");
  const t1 = document.getElementById("s4-task1");
  const t2 = document.getElementById("s4-task2");
  const t3 = document.getElementById("s4-task3");
  const after = document.getElementById("s4-after");
  let lastTick = 50;

  function render() {
    const v = parseInt(dial.value);
    const w = v / 100;          // weight on watchtime
    const ww = w, wl = 1 - w;   // ww + wl = 1
    wWatch.textContent = ww.toFixed(2);
    wLikes.textContent = wl.toFixed(2);

    if (Math.abs(v - lastTick) >= 6) { SFX.tick(); lastTick = v; }

    const scored = STEP4_CARDS.map(c => ({
      ...c,
      score: ww * c.watchtime + wl * c.likes
    })).sort((a, b) => b.score - a.score);

    scoresEl.innerHTML = scored.map((c, i) => `
      <div class="score-item ${i === 0 ? 'top' : ''}">
        <div class="rank-bubble">#${i + 1}</div>
        <div class="si-meta">
          <div class="si-title">${c.emoji} ${c.title}</div>
          <div class="si-bars">
            <div class="si-bar">
              <span>watch&nbsp;time</span>
              <div class="bar-track"><div class="bar-fill" style="width:${c.watchtime * 100}%"></div></div>
              <span class="si-num">${c.watchtime.toFixed(2)}</span>
            </div>
            <div class="si-bar">
              <span>likes</span>
              <div class="bar-track"><div class="bar-fill alt" style="width:${c.likes * 100}%"></div></div>
              <span class="si-num">${c.likes.toFixed(2)}</span>
            </div>
          </div>
        </div>
        <div class="si-final">
          <div class="lbl">SCORE</div>
          <div class="val">${c.score.toFixed(2)}</div>
        </div>
      </div>
    `).join('');

    // Task checks
    const top = scored[0];
    const second = scored[1];
    if (top.id === "A" && !t1.classList.contains("done")) {
      t1.classList.add("done"); SFX.soft();
    }
    if (top.id === "B" && !t2.classList.contains("done")) {
      t2.classList.add("done"); SFX.soft();
    }
    // Task 3: A and C tied at top.
    // A: ww*0.8 + wl*0.3 = 0.8w + 0.3(1-w) = 0.5w + 0.3
    // C: ww*0.6 + wl*0.6 = 0.6
    // Equal at 0.5w + 0.3 = 0.6 → w = 0.6 (slider at 60).
    // Both A and C must currently be tied AND at the top (not B/D ahead).
    const sA = 0.8 * w + 0.3 * (1 - w);
    const sC = 0.6;
    const tied = Math.abs(sA - sC) < 0.005;
    const aOnTop = top.id === "A" && second.id === "C";
    const cOnTop = top.id === "C" && second.id === "A";
    if (tied && (aOnTop || cOnTop) && !t3.classList.contains("done")) {
      t3.classList.add("done"); SFX.correct();
    }

    if (t1.classList.contains("done") && t2.classList.contains("done") && t3.classList.contains("done")
        && after.classList.contains("hidden")) {
      after.classList.remove("hidden");
      setTimeout(() => after.scrollIntoView({ behavior: "smooth", block: "center" }), 300);
    }
  }
  dial.addEventListener("input", render);
  render();
}

// ═══════════════════════════════════════════════════════════
// STEP 6 — Two Realities (side-by-side)
// ═══════════════════════════════════════════════════════════
function renderStep6() {
  // Kid's feed: re-rank from STATE.topicLikes

    ? rankFeed(pool, kidWeights, STATE.topicLikes, 5)
    : rankFeed(pool, { topic: 0, watchtime: 0.3, recent: 0.4, friends: 0.3 }, {}, 5);

  const mayaWeights = { topic: 0.6, watchtime: 0.3, recent: 0.05, friends: 0.05 };

        <div class="options" id="s6-mcq">

          ${mcqOpt("B", "Maya — she sees the real feed", false)}
          ${mcqOpt("C", "Neither — both feeds are real, both are partial", true)}
          ${mcqOpt("D", "Whoever has more friends online wins", false)}
        </div>

      <div class="feedback hidden" id="s6-fb">
        <strong>That's it.</strong> You're not seeing the internet. You're seeing <em>your slice</em>. Maya's seeing hers. Two truths. Both real. Both incomplete. There's a name for this — it's called a <strong>filter bubble</strong>.

}

// ═══════════════════════════════════════════════════════════
// STEP 7 — Fix Maya's Feed (surprise dial + multi-correct)
// ═══════════════════════════════════════════════════════════
function renderStep7() {
  const mayaFeed = rankFeed(VIDEOS, { topic: 0.6, watchtime: 0.3, recent: 0.05, friends: 0.05 }, MAYA_TAPS, 6);
  return `
    <div class="frame">${progressDots(8, 6)}
      <div class="step-label">Step 7 of 8</div>
      <div class="step-title">Help Maya. One dial — how much surprise to add.</div>

      ${tinyBubble(`This is what an engineer does. They pick a dial. They live with what it does.`)}

      <div class="dial-wrap">
        <div class="dial-row">
          <div class="dial-end"><span class="arrow">←</span>STAY IN HER ZONE</div>
          <input type="range" class="dial" id="s7-dial" min="0" max="100" value="0">
          <div class="dial-end">ADD SURPRISE<span class="arrow">→</span></div>
        </div>
        <div class="dial-readout" id="s7-readout">0% surprise · 100% her usual</div>
      </div>

      <div id="s7-feed">${feedHTML(mayaFeed, { who: "MAYA · before", disabled: true })}</div>

      <div id="s7-question" class="hidden">
        <div class="question">
          <div class="q-label">✅ Pick all that are true (you need 3)</div>
          <div class="q-text">Adding surprise to Maya's feed — what's actually happening?</div>
          <div class="options" id="s7-mcq">
            ${multiOpt("Adding surprise is censoring Maya's choices", false)}
            ${multiOpt("The feed was already filtered — adding surprise is just a different filter", true)}
            ${multiOpt("'No filter' isn't an option that exists for any feed", true)}
            ${multiOpt("Maya can still find sad content if she searches for it", true)}
            ${multiOpt("The original sad feed was the 'real' feed", false)}
          </div>
          <button class="check-btn" id="s7-check" disabled style="margin-top: 10px;">Check my picks</button>
        </div>
        <div class="feedback hidden" id="s7-fb">
          <strong>Right.</strong> Every feed is filtered. The only question is — <em>filtered toward what?</em> Toward what she already taps? Toward what surprises her? Toward what makes the app the most money? Someone is always choosing.
        </div>
        <div class="nav-row end"><button class="btn" id="s7-next" disabled onclick="markAndGoto(7, 8)">See the reveal →</button></div>
      </div>
    </div>`;
}

function mountStep7() {
  const dial = document.getElementById("s7-dial");
  const readout = document.getElementById("s7-readout");
  const feed = document.getElementById("s7-feed");
  const qWrap = document.getElementById("s7-question");
  let lastTick = 0;
  let opened = false;

  function render() {
    const v = parseInt(dial.value);
    const surprise = v / 100;       // 0..1
    readout.textContent = `${v}% surprise · ${100 - v}% her usual`;
    if (Math.abs(v - lastTick) >= 8) { SFX.tick(); lastTick = v; }

    // Mix: weight on sad topic decreases with surprise; weight on freshness/variety rises.
    const sadWeight = 0.6 * (1 - surprise);
    const recentWeight = 0.05 + 0.4 * surprise;
    const friendWeight = 0.05 + 0.2 * surprise;
    const watchWeight = 0.3 - 0.1 * surprise;
    const weights = { topic: sadWeight, watchtime: watchWeight, recent: recentWeight, friends: friendWeight };
    let videos = rankFeed(VIDEOS, weights, MAYA_TAPS, 6);
    // When surprise is high, force at least 2 non-sad
    if (surprise > 0.4) {
      const nonSad = videos.filter(v => v.topic !== "sad");
      if (nonSad.length < 2) {
        const extra = VIDEOS.filter(v => v.topic !== "sad" && !videos.includes(v))
                            .sort((a, b) => (b.likes + b.freshness) - (a.likes + a.freshness));
        videos = videos.filter(v => v.topic === "sad").slice(0, 4).concat(extra.slice(0, 2));
      }
    }
    feed.innerHTML = feedHTML(videos, { who: surprise === 0 ? 'MAYA · before' : `MAYA · ${v}% surprise`, disabled: true });
    if (v >= 50 && !opened) {
      opened = true;
      qWrap.classList.remove("hidden");
      setupMultiMCQ("s7-mcq", "s7-check", "s7-fb", "s7-next");
      setTimeout(() => qWrap.scrollIntoView({ behavior: "smooth", block: "center" }), 300);
    }
  }
  dial.addEventListener("input", render);
  render();
}

// ═══════════════════════════════════════════════════════════
// RENDER + NAVIGATION
// ═══════════════════════════════════════════════════════════
function render() {
  const s = CHALLENGE.sections[currentSection];
  const main = document.getElementById("main");
  let html = '';
  if (s.kind === "intro") html = renderIntro();
  else if (s.kind === "step1") html = renderStep1();
  else if (s.kind === "step2") html = renderStep2();
  else if (s.kind === "step3") html = renderStep3();
  else if (s.kind === "step4") html = renderStep4();
  else if (s.kind === "step5") html = renderStep5();
  else if (s.kind === "step6") html = renderStep6();
  else if (s.kind === "step7") html = renderStep7();
  else if (s.kind === "step8") html = renderStep8();
  else if (s.kind === "completion") html = renderCompletion();
  main.innerHTML = html;

  if (s.kind === "step1") mountStep1();
  else if (s.kind === "step2") mountStep2();
  else if (s.kind === "step3") mountStep3();
  else if (s.kind === "step4") mountStep4();
  else if (s.kind === "step5") mountStep5();
  else if (s.kind === "step6") mountStep6();
  else if (s.kind === "step7") mountStep7();
  else if (s.kind === "step8") mountStep8();

  renderSidebar();
  updateStepIndicator();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function gotoSection(idx) {
  if (idx < 0 || idx >= CHALLENGE.sections.length) return;
  SFX.click();
  currentSection = idx;
  syncScreenURL();
  render();
}

function syncScreenURL() {
  try {
    const url = new URL(window.location.href);
    url.searchParams.set('screen', currentSection + 1);
    window.history.replaceState({}, '', url.toString());
  } catch (e) {}
}

function getScreenFromURL() {
  const raw = new URLSearchParams(window.location.search).get('screen');
  if (raw === null) return null;
  const s = parseInt(raw, 10);
  if (Number.isNaN(s) || s < 1 || s > CHALLENGE.sections.length) return null;
  return s - 1;
}

function markAndGoto(markIdx, goIdx) {
  completedSections.add(markIdx);
  gotoSection(goIdx);
}

// INIT — honor ?screen=N
const _urlScreen = getScreenFromURL();
if (_urlScreen !== null) currentSection = _urlScreen;
syncScreenURL();
render();
</script>
