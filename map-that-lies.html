<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Map That Lies — RML</title>
<style>
:root {
  --bg: #FBF5E8;
  --bg-2: #F5EDD8;
  --card: #FFFFFF;
  --border: #E8DFC8;
  --border-strong: #C9BE9F;
  --shadow: 0 6px 24px rgba(60, 45, 30, 0.08);
  --shadow-lift: 0 12px 40px rgba(60, 45, 30, 0.14);

  --text: #2B2320;
  --text-2: #5E544D;
  --text-3: #99908A;

  --mint: #2EB39E;
  --mint-2: #5FC9B5;
  --mint-bg: #DFF5EF;
  --mint-ink: #1A6A5C;

  --coral: #E85D75;
  --coral-bg: #FDE7EB;
  --coral-ink: #B72F47;

  --orange: #F99B4E;
  --orange-bg: #FDECDB;

  --yellow: #F4C430;
  --yellow-bg: #FDF3CA;

  --purple: #8E6FD8;
  --purple-bg: #EFE8FC;

  --navy: #2B3861;

  --ocean: #B6DEDA;
  --ocean-deep: #94CBC0;
  --land: #F1E0BF;
  --land-shadow: #C9AC78;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Nunito", "SF Pro Rounded", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-weight: 600;
  line-height: 1.4;
}

.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 17px; color: var(--text); }
.topbar-brand .logo {
  background: var(--mint);
  color: white;
  width: 32px; height: 32px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.topbar-meta { font-size: 13px; color: var(--text-3); font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.mute-btn {
  background: var(--bg-2);
  border: 1px solid var(--border);
  width: 40px; height: 40px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.15s;
}
.mute-btn:hover { transform: scale(1.08); background: var(--yellow-bg); }

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  max-width: 1200px;
  margin: 0 auto;
  min-height: calc(100vh - 60px);
}
.sidebar { padding: 28px 16px 40px; border-right: 1px solid var(--border); background: var(--bg); }
.sidebar h4 {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--text-3);
  margin: 0 12px 10px;
  font-weight: 900;
  text-transform: uppercase;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-2);
  transition: all 0.15s;
  margin-bottom: 3px;
  border: 2px solid transparent;
}
.nav-item:hover { background: var(--bg-2); color: var(--text); }
.nav-item.current {
  background: var(--mint-bg);
  color: var(--mint-ink);
  border-color: var(--mint);
}
.nav-item.done { color: var(--text); }
.nav-num {
  background: var(--border);
  color: var(--text-2);
  width: 26px; height: 26px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 900;
  flex-shrink: 0;
}
.nav-item.current .nav-num { background: var(--mint); color: white; }
.nav-item.done .nav-num { background: var(--mint-bg); color: var(--mint-ink); }
.nav-item.done .nav-num::before { content: "✓"; }
.nav-item.done .nav-num-text { display: none; }

.main { padding: 32px 40px 60px; min-width: 0; }
.frame {
  background: var(--card);
  border-radius: 20px;
  padding: 28px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  max-width: 820px;
  margin: 0 auto;
}

.progress-wrap { display: flex; gap: 5px; margin-bottom: 22px; }
.progress-dot {
  flex: 1; height: 6px;
  background: var(--border);
  border-radius: 3px;
  transition: background 0.4s;
}
.progress-dot.active { background: var(--mint); }
.progress-dot.current { background: var(--orange); }

.step-label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--mint-ink);
  margin-bottom: 6px;
}
.step-title {
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 18px;
  line-height: 1.25;
  letter-spacing: -0.3px;
}

/* MASCOT */
.mascot-row { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 18px; }
.mascot { flex-shrink: 0; width: 64px; height: 64px; }
.mascot svg { width: 100%; height: 100%; }
.mascot.spin svg { animation: atlasSpin 0.9s ease-out; }
@keyframes atlasSpin {
  from { transform: rotate(0); }
  to { transform: rotate(360deg); }
}
.bubble {
  flex: 1;
  background: var(--mint-bg);
  border: 2px solid var(--mint);
  border-radius: 18px;
  padding: 14px 18px;
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  line-height: 1.5;
  position: relative;
}
.bubble::before {
  content: "";
  position: absolute;
  left: -10px; top: 18px;
  width: 0; height: 0;
  border: 10px solid transparent;
  border-right-color: var(--mint);
  border-left: 0;
}
.bubble::after {
  content: "";
  position: absolute;
  left: -7px; top: 20px;
  width: 0; height: 0;
  border: 8px solid transparent;
  border-right-color: var(--mint-bg);
  border-left: 0;
}
.bubble .name {
  color: var(--mint-ink);
  font-weight: 900;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.bubble.tiny { padding: 10px 14px; font-size: 14px; }

/* MAP */
.map-wrap {
  background: var(--ocean);
  border: 2px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  position: relative;
  margin: 12px 0 6px;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.map-foot {
  font-size: 11px;
  font-weight: 900;
  color: var(--text-3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 12px;
}
svg.world {
  display: block;
  width: 100%;
  height: auto;
  background: linear-gradient(180deg, #ABD5CD 0%, #C2E2DA 50%, #ABD5CD 100%);
}
.world .land-static { fill: var(--land); stroke: var(--land-shadow); stroke-width: 0.9; stroke-linejoin: round; }
.world .grid { stroke: rgba(255,255,255,0.5); stroke-width: 0.7; fill: none; stroke-dasharray: 2 4; }
.world .equator { stroke: rgba(232,93,117,0.7); stroke-width: 1.6; stroke-dasharray: 6 5; }
.world .equator-label {
  fill: rgba(183,47,71,0.95);
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 2px;
}
.world .pole-label {
  fill: rgba(94,108,142,0.85);
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 1.5px;
}

.country-grp { transition: filter 0.2s; }
.country-grp.draggable { cursor: grab; filter: drop-shadow(0 5px 10px rgba(60,45,30,0.22)); }
.country-grp.draggable:hover { filter: drop-shadow(0 7px 14px rgba(60,45,30,0.3)); }
.country-grp.draggable:active { cursor: grabbing; }
.country-grp.greenland .country { fill: #E85D75; stroke: #B72F47; stroke-width: 1.5; }
.country-grp.africa .country { fill: #F99B4E; stroke: #C67838; stroke-width: 1.5; }
.country-grp.locked .country { opacity: 0.92; }
.country-grp .label {
  fill: white;
  font-weight: 900;
  text-anchor: middle;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  pointer-events: none;
}

.drag-arrow {
  fill: var(--coral);
  opacity: 0.9;
  animation: bounceArrow 1.1s ease-in-out infinite;
}
@keyframes bounceArrow {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}
.drag-arrow.up { animation-name: bounceArrowUp; }
@keyframes bounceArrowUp {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.readouts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.readout {
  background: var(--card);
  border: 2px solid var(--border-strong);
  border-radius: 12px;
  padding: 10px 14px;
  font-family: "SF Mono", ui-monospace, monospace;
}
.readout .lbl {
  font-size: 9px;
  letter-spacing: 1.5px;
  font-weight: 900;
  color: var(--text-3);
  margin-bottom: 3px;
}
.readout .val {
  font-size: 18px;
  color: var(--coral-ink);
  font-weight: 900;
  letter-spacing: -0.5px;
}
.readout.locked .val { color: var(--mint-ink); }
.readout .sub {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
  font-weight: 700;
}

/* Globe-to-Flat simulation */
.sim-frame {
  background: linear-gradient(180deg, #103838 0%, #1F4E4A 100%);
  border-radius: 18px;
  padding: 18px 18px 22px;
  margin: 8px 0 14px;
  color: #F5E8D3;
}
.sim-title {
  font-size: 11px;
  letter-spacing: 2px;
  font-weight: 900;
  color: #94CBC0;
  margin-bottom: 4px;
}
.sim-sub {
  font-size: 13px;
  color: #C8DAC9;
  margin-bottom: 14px;
  font-weight: 600;
}
.sim-stage {
  background: rgba(0,0,0,0.18);
  border-radius: 14px;
  padding: 14px 12px;
  margin-bottom: 14px;
}
.sim-stage svg { width: 100%; height: auto; display: block; }
.sim-controls {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 12px;
  align-items: center;
}
.sim-end {
  font-size: 11px;
  letter-spacing: 1.5px;
  font-weight: 900;
  color: #F5E8D3;
  white-space: nowrap;
}
.sim-end .ico { font-size: 18px; display: block; text-align: center; margin-bottom: 2px; }
.sim-controls input[type="range"] {
  flex: 1;
  accent-color: #F99B4E;
  height: 8px;
}
.sim-readout {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 10px 14px;
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  font-family: "SF Mono", ui-monospace, monospace;
}
.sim-readout .lbl {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: #94CBC0;
  font-weight: 900;
  margin-bottom: 3px;
}
.sim-readout .val {
  font-size: 16px;
  font-weight: 900;
  color: #F99B4E;
  letter-spacing: -0.5px;
}
.sim-readout .row.eq .val { color: #5FC9B5; }

/* Globe reveal */
.globe-reveal {
  background: linear-gradient(135deg, #0F2A2A 0%, #133D3F 100%);
  border-radius: 18px;
  padding: 20px;
  margin: 8px 0 14px;
  color: #F5E8D3;
  position: relative;
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 20px;
  align-items: center;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.3);
  animation: fadeInUp 0.5s ease-out;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.globe-reveal svg.globe { width: 100%; height: auto; max-width: 220px; display: block; }
.globe-reveal .gtitle {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  color: #94CBC0;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.globe-reveal h3 {
  font-size: 22px;
  font-weight: 900;
  color: #FFFBF0;
  margin-bottom: 10px;
  letter-spacing: -0.5px;
  line-height: 1.15;
}
.globe-reveal p { font-size: 14px; color: #C8DAC9; line-height: 1.45; font-weight: 600; margin-bottom: 8px; }
.globe-reveal .stats {
  display: flex;
  gap: 14px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.globe-reveal .stat {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.16);
  padding: 6px 12px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 800;
}
.globe-reveal .stat .num {
  font-family: "SF Mono", ui-monospace, monospace;
  color: var(--orange);
  font-weight: 900;
  font-size: 14px;
}
@media (max-width: 600px) {
  .globe-reveal { grid-template-columns: 1fr; text-align: center; }
  .globe-reveal svg.globe { margin: 0 auto; }
}

/* QUESTIONS */
.question {
  background: var(--yellow-bg);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 18px 20px;
  margin-bottom: 14px;
}
.q-label {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1.5px;
  color: var(--orange);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.q-text {
  font-size: 17px;
  color: var(--text);
  font-weight: 800;
  margin-bottom: 14px;
  line-height: 1.35;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  color: var(--text);
  font-size: 15px;
  font-weight: 700;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  line-height: 1.4;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.option-num {
  background: var(--bg-2);
  color: var(--text-2);
  width: 26px; height: 26px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  font-weight: 900;
  flex-shrink: 0;
}
.option:hover:not(:disabled) { border-color: var(--mint-2); transform: translateY(-1px); box-shadow: var(--shadow); }
.option.selected { border-color: var(--mint); background: var(--mint-bg); }
.option.correct { border-color: var(--mint); background: var(--mint-bg); color: var(--mint-ink); }
.option.correct .option-num { background: var(--mint); color: white; }
.option.wrong { border-color: var(--coral); background: var(--coral-bg); color: var(--coral-ink); animation: shake 0.4s; }
.option:disabled { cursor: default; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}

/* Rank cards */
.rank-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 16px 0 12px;
}
@media (max-width: 600px) { .rank-grid { grid-template-columns: 1fr 1fr; } }
.rank-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 10px 10px;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: all 0.18s;
  font-family: inherit;
}
.rank-card:hover:not(:disabled) { border-color: var(--mint-2); transform: translateY(-2px); box-shadow: var(--shadow); }
.rank-card:disabled { cursor: default; opacity: 0.6; }
.rank-card .rk-shape {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  height: 80px;
  margin-bottom: 8px;
}
.rank-card .rk-name { font-size: 13px; font-weight: 900; color: var(--text); }
.rank-card .rk-area {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 800;
  margin-top: 2px;
  font-family: "SF Mono", ui-monospace, monospace;
}
.rank-card .rk-pick {
  position: absolute;
  top: 6px; right: 8px;
  background: var(--mint);
  color: white;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 900;
  opacity: 0;
}
.rank-card.picked { border-color: var(--mint); background: var(--mint-bg); }
.rank-card.picked .rk-pick { opacity: 1; }
.rank-card.wrong { animation: shake 0.4s; border-color: var(--coral); background: var(--coral-bg); }

.rank-status {
  text-align: center;
  font-size: 13px;
  font-weight: 800;
  color: var(--text-2);
  background: var(--bg-2);
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 14px;
}
.rank-status.win {
  background: var(--mint-bg);
  color: var(--mint-ink);
  border: 1px solid var(--mint);
}

.feedback {
  padding: 14px 18px;
  border-radius: 14px;
  border-left: 4px solid var(--mint);
  background: var(--mint-bg);
  font-size: 15px;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 16px;
  font-weight: 600;
}
.feedback.hot { border-color: var(--coral); background: var(--coral-bg); }
.feedback.purple { border-color: var(--purple); background: var(--purple-bg); }
.feedback strong { color: var(--text); font-weight: 900; }
.feedback em { color: var(--mint-ink); font-style: normal; font-weight: 900; }

.tool-card {
  background: linear-gradient(135deg, var(--mint-bg) 0%, var(--yellow-bg) 100%);
  border: 2px solid var(--mint);
  border-radius: 20px;
  padding: 26px;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
  animation: toolReveal 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes toolReveal {
  from { transform: scale(0.8) rotate(-4deg); opacity: 0; }
  to { transform: scale(1) rotate(0); opacity: 1; }
}
.tool-card::before {
  content: attr(data-emoji);
  position: absolute;
  top: -20px; right: -10px;
  font-size: 100px;
  opacity: 0.15;
  transform: rotate(15deg);
}
.tool-card .tool-tag { font-size: 11px; letter-spacing: 2px; color: var(--mint-ink); font-weight: 900; margin-bottom: 10px; }
.tool-card h3 { font-size: 26px; color: var(--text); margin-bottom: 10px; font-weight: 900; letter-spacing: -0.5px; }
.tool-card p { font-size: 15px; color: var(--text-2); line-height: 1.5; font-weight: 600; }
.tool-card ol { margin: 8px 0 0 22px; padding: 0; }
.tool-card ol li { font-size: 14px; color: var(--text); font-weight: 700; margin-bottom: 4px; }

.nav-row { display: flex; justify-content: space-between; margin-top: 8px; gap: 10px; }
.nav-row.end { justify-content: flex-end; }
.btn {
  background: var(--mint);
  color: white;
  padding: 14px 28px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn:hover:not(:disabled) { background: var(--mint-2); transform: translateY(-2px); box-shadow: var(--shadow-lift); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.btn.secondary { background: var(--bg-2); color: var(--text); }
.btn.coral { background: var(--coral); }
.btn.coral:hover { background: #d84866; }

.hidden { display: none !important; }

.case-hero {
  background:
    radial-gradient(ellipse 520px 260px at 50% 40%, rgba(94,201,181,0.22) 0%, transparent 72%),
    linear-gradient(165deg, #0F2A2A 0%, #061518 100%);
  border-radius: 24px;
  padding: 34px 28px;
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
  color: #F5E8D3;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
}
.case-hero .tag-line {
  display: inline-block;
  background: var(--mint);
  color: white;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 11px;
  letter-spacing: 1.5px;
  font-weight: 900;
  margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(46,179,158,0.5);
}
.case-hero h1 {
  font-size: 40px;
  font-weight: 900;
  color: #FFFBF0;
  margin-bottom: 10px;
  letter-spacing: -1.5px;
  line-height: 1;
  text-align: center;
  text-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.case-hero .hook {
  font-size: 17px;
  color: #C8DAC9;
  font-weight: 700;
  text-align: center;
  margin-bottom: 18px;
  max-width: 540px;
  margin-left: auto;
  margin-right: auto;
}
.case-hero-meta {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 13px;
  color: #F5E8D3;
  font-weight: 800;
}

function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(f, d = 100, t = 'sine', v = 0.1) {
  if (muted) return;
  initAudio();
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = t; o.frequency.value = f;
  g.gain.setValueAtTime(v, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d/1000);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + d/1000);
}

  click: () => tone(600, 40, 'square', 0.05),

function latFromY(y) {

function yFromLat(lat) {
  return MAP.h / 2 - (lat / LAT_MAX) * (MAP.h / 2);

function mercScale(lat) {

// ═══════════════════════════════════════════════════════════
// DRAG MECHANIC
// ═══════════════════════════════════════════════════════════
function attachDrag(svg, group, opts = {}) {
  const onMove = opts.onMove || (() => {});
  const onEnd = opts.onEnd || (() => {});
  let dragging = false, startPt = null, startCenter = null, lastTickY = 0;

  function svgPoint(evt) {
    const pt = svg.createSVGPoint();
    const t = evt.touches ? evt.touches[0] : evt;
    pt.x = t.clientX; pt.y = t.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }
  function getCenter() {
    const m = group.transform.baseVal.consolidate();
    if (!m) return { x: 0, y: 0 };
    return { x: m.matrix.e, y: m.matrix.f };
  }
  function down(e) {
    if (!group.classList.contains("draggable")) return;
    if (group.classList.contains("locked")) return;
    e.preventDefault();
    dragging = true;
    startPt = svgPoint(e);
    startCenter = getCenter();
    lastTickY = startCenter.y;
  }
  function move(e) {
    if (!dragging) return;
    e.preventDefault();
    const pt = svgPoint(e);
    let nx = startCenter.x + (pt.x - startPt.x);
    let ny = startCenter.y + (pt.y - startPt.y);
    nx = Math.max(60, Math.min(MAP.w - 60, nx));
    ny = Math.max(yFromLat(LAT_MAX - 2), Math.min(yFromLat(-(LAT_MAX - 2)), ny));
    const lat = latFromY(ny);
    const s = mercScale(lat);
    group.setAttribute("transform", `translate(${nx},${ny}) scale(${s.toFixed(4)})`);
    group.dataset.lat = lat;
    const lbl = group.querySelector(".label");
    if (lbl) lbl.style.fontSize = (11 / s).toFixed(2) + "px";
    if (Math.abs(ny - lastTickY) > 18) { SFX.tick(); lastTickY = ny; }
    onMove({ lat, scale: s, x: nx, y: ny });
  }
  function up() {
    if (!dragging) return;
    dragging = false;
    const c = getCenter();
    const lat = latFromY(c.y);
    onEnd({ lat, scale: mercScale(lat), x: c.x, y: c.y });
  }
  group.addEventListener("mousedown", down);
  group.addEventListener("touchstart", down, { passive: false });
  document.addEventListener("mousemove", move);
  document.addEventListener("touchmove", move, { passive: false });
  document.addEventListener("mouseup", up);
  document.addEventListener("touchend", up);
}

function progressDots(total, current) {
  let html = '<div class="progress-wrap">';

    const cls = i < current ? 'active' : (i === current ? 'current' : '');
    html += `<div class="progress-dot ${cls}"></div>`;
  }
  return html + '</div>';
}
function bubble(text, name = "ATLAS") {

}
function mcqOpt(letter, text, correct) {
  return `<button class="option" data-correct="${correct}"><span class="option-num">${letter}</span>${text}</button>`;
}
function setupMCQ(mcqId, fbId, nextId, onCorrect, onAny) {
  const mcq = document.getElementById(mcqId);
  if (!mcq) return;
  mcq.querySelectorAll(".option").forEach(btn => {
    btn.addEventListener("click", () => {
      const correct = btn.dataset.correct === "true";
      if (onAny) onAny(btn, correct);
      if (correct) {
        SFX.correct();
        mcq.querySelectorAll(".option").forEach(o => o.disabled = true);
        btn.classList.add("correct");
        if (fbId) document.getElementById(fbId).classList.remove("hidden");
        if (nextId) document.getElementById(nextId).disabled = false;
        if (onCorrect) onCorrect();
      } else {
        SFX.wrong();
        btn.classList.add("wrong");
        setTimeout(() => btn.classList.remove("wrong"), 800);
      }
    });
  });

// STEP 2 — INTERACTIVE GLOBE-TO-FLAT SIMULATION
// Kid drags slider from ROUND → FLAT.
// Latitude bands stretch from cos(lat)·width (true on globe) to full width (flat).
// Greenland sits on a polar band (stretches huge). Africa on equator (no change).
// ═══════════════════════════════════════════════════════════
const SIM_LATS = [70, 50, 30, 0, -30, -50, -70];
function renderStep2() {

        <div class="sim-sub">Each band is a horizontal slice of Earth. On a globe, polar bands are tiny. To fit a flat rectangle, every band has to be stretched to equator-width.</div>
        <div class="sim-stage">
          <svg id="sim-svg" viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="sim-controls">
          <div class="sim-end"><span class="ico">🌍</span>ROUND</div>
          <input type="range" id="sim-slider" min="0" max="100" value="0">
          <div class="sim-end"><span class="ico">🗺</span>FLAT</div>
        </div>
        <div class="sim-readout">
          <div class="row">
            <div class="lbl">🟥 Greenland's band (70°N)</div>
            <div class="val" id="sim-r-greenland">1.00× · true size</div>
          </div>
          <div class="row eq">
            <div class="lbl">🟧 Africa's band (equator)</div>
            <div class="val" id="sim-r-africa">1.00× · true size</div>
          </div>
        </div>
      </div>

      <div id="s2-after" class="hidden">
        ${tinyBubble(`<strong>That's the whole secret.</strong> The equator stays put. Polar bands have to stretch <em>way out</em> to fill the rectangle — that's why Greenland balloons. The math is right there: if a band's true width is small, the stretch ratio is huge.`)}

        <div class="question">
          <div class="q-label">🤔 You felt it — now name it</div>
          <div class="q-text">On a flat map, which bands get stretched the most?</div>
          <div class="options" id="s2-mcq">
            ${mcqOpt("A", "The equator", false)}

            ${mcqOpt("D", "All bands stretch equally", false)}
          </div>
        </div>
        <div class="feedback hidden" id="s2-fb">
          <strong>Yes.</strong> The closer to the poles, the smaller the band's true width — so the bigger the stretch needed to make it fit. That's why Greenland (way up at 70°N) inflates ~3× linear, ~9× by area.
        </div>

        <div class="nav-row end"><button class="btn" id="s2-next" disabled onclick="markAndGoto(2, 3)">Now drag Greenland →</button></div>

}

function mountStep2() {
  const slider = document.getElementById("sim-slider");
  const svg = document.getElementById("sim-svg");
  const rGreenland = document.getElementById("sim-r-greenland");
  const rAfrica = document.getElementById("sim-r-africa");
  const after = document.getElementById("s2-after");
  let revealed = false;
  let lastTick = 0;

  const VBW = 700, VBH = 320;
  const labelW = 70, ratioW = 70;
  const maxBandW = VBW - labelW - ratioW - 20; // = 540
  const stripH = 38;
  const startY = 14;
  const cx = labelW + 10 + maxBandW / 2;

  function render() {
    const v = parseInt(slider.value);
    const t = v / 100;  // 0..1
    let html = '';

    SIM_LATS.forEach((lat, i) => {
      const cosLat = Math.cos(lat * Math.PI / 180);
      // Band true width on globe = cosLat * maxBandW. At flat, full maxBandW.
      const w = maxBandW * (cosLat + (1 - cosLat) * t);
      const x = cx - w / 2;
      const y = startY + i * stripH;
      const stretch = w / (maxBandW * cosLat);   // 1 at globe, 1/cosLat at flat
      const isEq = lat === 0;
      const isGreenlandBand = lat === 70;
      const fill = isEq ? "#5FC9B5" : (isGreenlandBand ? "#E85D75" : "#94CBC0");
      const stroke = isEq ? "#1A6A5C" : (isGreenlandBand ? "#B72F47" : "#5FA8A0");
      const opacity = isEq || isGreenlandBand ? 1 : 0.7;

      // Band rectangle
      html += `<rect x="${x}" y="${y}" width="${w}" height="${stripH - 6}" fill="${fill}" stroke="${stroke}" stroke-width="${isEq || isGreenlandBand ? 1.5 : 0.8}" rx="3" opacity="${opacity}"/>`;
      // Latitude label (left)
      const latLabel = lat > 0 ? `${lat}°N` : (lat < 0 ? `${-lat}°S` : 'EQUATOR');
      const labelColor = isEq ? '#1A6A5C' : (isGreenlandBand ? '#B72F47' : '#5E544D');
      html += `<text x="${labelW + 4}" y="${y + (stripH - 6)/2 + 4}" fill="${labelColor}" font-size="11" font-weight="900" text-anchor="end" font-family="SF Mono, ui-monospace, monospace">${latLabel}</text>`;
      // Stretch ratio (right)
      const ratioColor = isGreenlandBand ? '#FFC8C8' : (isEq ? '#94CBC0' : '#C8DAC9');
      html += `<text x="${labelW + 16 + maxBandW + 6}" y="${y + (stripH - 6)/2 + 4}" fill="${ratioColor}" font-size="12" font-weight="900" font-family="SF Mono, ui-monospace, monospace">${stretch.toFixed(2)}×</text>`;

      // Greenland on its band
      if (isGreenlandBand) {
        // Greenland's display width on band scales with stretch
        const baseScale = 0.40;
        const sc = baseScale * stretch;
        html += `<g transform="translate(${cx}, ${y + (stripH - 6)/2}) scale(${sc.toFixed(3)})"><path d="${COUNTRIES.greenland.path}" fill="white" stroke="#7A1F30" stroke-width="2"/></g>`;
        html += `<text x="${cx}" y="${y + (stripH - 6)/2 + 3}" fill="#B72F47" font-size="${(8/Math.max(sc,0.4)).toFixed(2)}" font-weight="900" text-anchor="middle" letter-spacing="0.5">GR</text>`;
      }
      // Africa on equator
      if (isEq) {
        const baseScale = 0.13;
        html += `<g transform="translate(${cx}, ${y + (stripH - 6)/2}) scale(${baseScale})"><path d="${COUNTRIES.africa.path}" fill="#F99B4E" stroke="#7A4818" stroke-width="2.5"/></g>`;
      }
    });

    // Caption inside SVG: visual frame
    html += `<text x="${cx}" y="${VBH - 6}" fill="rgba(245,232,211,0.7)" font-size="9" text-anchor="middle" font-weight="900" letter-spacing="2">${t < 0.05 ? 'GLOBE — TRUE PROPORTIONS' : t > 0.95 ? 'FLAT — MERCATOR LIES' : 'STRETCHING…'}</text>`;

    svg.innerHTML = html;

    // Readouts
    const cos70 = Math.cos(70 * Math.PI / 180);
    const stretchG = (cos70 + (1 - cos70) * t) / cos70;
    rGreenland.textContent = `${stretchG.toFixed(2)}× · ${t < 0.02 ? 'true size' : (t > 0.98 ? 'fully stretched' : 'stretching…')}`;
    rAfrica.textContent = `1.00× · never changes`;

    if (Math.abs(v - lastTick) >= 7) { SFX.tick(); lastTick = v; }

    if (v >= 90 && !revealed) {
      revealed = true;
      SFX.snap();
      spinAtlas();
      after.classList.remove("hidden");
      setupMCQ("s2-mcq", "s2-fb", "s2-next");
      setTimeout(() => after.scrollIntoView({ behavior: "smooth", block: "center" }), 400);
    }
  }
  slider.addEventListener("input", render);
  render();
}

        <div class="options" id="s6-mcq3">
          ${mcqOpt("A", "Mercator — every other classroom uses it", false)}
          ${mcqOpt("B", "Peters — accurate areas matter most", false)}
          ${mcqOpt("C", "Robinson — a balanced compromise, nothing wildly wrong", true)}
        </div>
      </div>

      <div class="feedback" id="s6-summary" style="display:none;">
        <strong>That's it.</strong> Sailors → Mercator. News charts → Peters. Classrooms → Robinson. <em>No map is "the right one."</em> Each was designed to lie about a specific thing — and tell the truth about another.
      </div>

      <div class="nav-row end"><button class="btn" id="s6-next" disabled onclick="markAndGoto(6, 7)">Earn the tool →</button></div>
    </div>`;
}
function mountStep6() {
  let solved = 0;
  const onSolve = () => {
    solved++;
    if (solved >= 2) {
      document.getElementById("s6-summary").style.display = "block";
      document.getElementById("s6-next").disabled = false;
    }
  };
  setupMCQ("s6-mcq1", null, null, onSolve);
  setupMCQ("s6-mcq2", null, null, onSolve);
  setupMCQ("s6-mcq3", null, null, onSolve);
}

// ═══════════════════════════════════════════════════════════
// STEP 7 — Tool Earned
// ═══════════════════════════════════════════════════════════
function renderStep7() {
  return `
    <div class="frame">${progressDots(7, 6)}
      <div class="step-label">Step 7 of 7 · The Lens</div>
      <div class="step-title">It's not just maps.</div>

      ${bubble(`Every flat picture of a complex world lies about something. A map. A chart. A summary. An AI's one-sentence answer. They all squish reality. The trick isn't to avoid them — it's to <em>know which lie you're using</em>.`)}

      <div class="tool-card" data-emoji="🗺">
        <div class="tool-tag">🎁 TOOL EARNED</div>
        <h3>🗺 The Projection Lens</h3>
        <p>When you see a model — a map, a chart, a summary, an AI answer — ask:</p>
        <ol>
          <li>What got <strong>preserved</strong>?</li>
          <li>What got <strong>sacrificed</strong>?</li>
          <li>Whose <strong>choice</strong> was that trade?</li>
        </ol>
        <p style="margin-top:10px;"><em style="font-style:normal;color:var(--mint-ink);font-weight:900;">No simplification is neutral. Every one is a choice.</em></p>
      </div>

      <div class="nav-row end"><button class="btn" onclick="markAndGoto(7, 8)">Close the case →</button></div>

}
function mountStep7() {
  if (!earnedTool) { earnedTool = true; SFX.tool(); }
}

// ═══════════════════════════════════════════════════════════
// COMPLETION
// ═══════════════════════════════════════════════════════════
function renderCompletion() {
  return `
    <div class="frame">
      <div class="complete-hero">
        <div class="tag">CASE CLOSED</div>
        <h1>You squished a globe.</h1>
        <div class="complete-summary">You watched the polar bands stretch out to fill the rectangle. Now you know exactly why every Mercator map lies — and you can spot the same trick in any flat picture of a complex world.</div>
      </div>

      ${bubble(`Africa is 14× the size of Greenland. The map you grew up with is a lie. It's a <em>useful</em> lie — but only if you know it's there.`)}

      <div class="share-card">
        <div class="preview-card">

          <p>The map I grew up with is a lie. → The Map That Lies, a Real Math League case.</p>
          <div class="brand">🗺 RML · cuemath.com/league</div>

        <button class="btn">Share the case</button>
      </div>

      <div class="nav-row">
        <button class="btn secondary" onclick="location.reload()">↻ Try again</button>
        <a href="./index-v2.html" style="text-decoration:none;"><button class="btn">More cases →</button></a>
      </div>
    </div>`;
}

function render() {
  const s = CHALLENGE.sections[currentSection];
  const main = document.getElementById("main");
  let html = '';
  if (s.kind === "intro") html = renderIntro();
  else if (s.kind === "step1") html = renderStep1();
  else if (s.kind === "step2") html = renderStep2();
  else if (s.kind === "step3") html = renderStep3();
  else if (s.kind === "step4") html = renderStep4();
  else if (s.kind === "step5") html = renderStep5();
  else if (s.kind === "step6") html = renderStep6();
  else if (s.kind === "step7") html = renderStep7();
  else if (s.kind === "completion") html = renderCompletion();
  main.innerHTML = html;

  if (s.kind === "step1") mountStep1();
  else if (s.kind === "step2") mountStep2();
  else if (s.kind === "step3") mountStep3();
  else if (s.kind === "step4") mountStep4();
  else if (s.kind === "step5") mountStep5();
  else if (s.kind === "step6") mountStep6();
  else if (s.kind === "step7") mountStep7();

  renderSidebar();
  updateStepIndicator();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function gotoSection(idx) {
  if (idx < 0 || idx >= CHALLENGE.sections.length) return;
  SFX.click();
  currentSection = idx;
  syncScreenURL();
  render();
}
function markAndGoto(markIdx, goIdx) {
  completedSections.add(markIdx);
  gotoSection(goIdx);
}

function syncScreenURL() {
  try {
    const url = new URL(window.location.href);
    url.searchParams.set('screen', currentSection + 1);
    window.history.replaceState({}, '', url.toString());
  } catch (e) {}
}

function getScreenFromURL() {
  const raw = new URLSearchParams(window.location.search).get('screen');
  if (raw === null) return null;
  const s = parseInt(raw, 10);
  if (Number.isNaN(s) || s < 1 || s > CHALLENGE.sections.length) return null;
  return s - 1;
}

// INIT — honor ?screen=N
const _urlScreen = getScreenFromURL();
if (_urlScreen !== null) currentSection = _urlScreen;
syncScreenURL();
render();
</script>
